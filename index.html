<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ConcursoPrep – Anki + Claude IA</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#060e1f;--surface:#0f1e36;--surface2:#162944;--surface3:#1c3358;
      --accent:#3b82f6;--accent2:#6366f1;--accent3:#10b981;
      --text:#e2e8f0;--muted:#64748b;--border:#1e3a5f;
      --easy:#86efac;--hard:#fdba74;--again:#fca5a5;
      --radius:14px;--radius-sm:8px;
      --font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
      background-image:radial-gradient(ellipse at 20% 20%,rgba(59,130,246,.07) 0%,transparent 60%),
                       radial-gradient(ellipse at 80% 80%,rgba(99,102,241,.05) 0%,transparent 60%);}

    /* ── LAYOUT ── */
    .app{max-width:1200px;margin:0 auto;padding:0 20px 60px;}

    /* ── TOPBAR ── */
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 0 16px;
      border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap;gap:12px;}
    .logo{font-size:20px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;}
    .logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;
      -webkit-text-fill-color:transparent;background-clip:text;}
    .topright{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .email-badge{font-size:12px;color:var(--muted);background:var(--surface2);padding:5px 12px;border-radius:999px;border:1px solid var(--border);}
    .streak-pill{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,#f97316,#ef4444);
      padding:5px 14px;border-radius:999px;font-size:13px;font-weight:700;}

    /* ── TABS ── */
    .tabs{display:flex;gap:3px;background:var(--surface);border-radius:var(--radius);padding:4px;
      margin-bottom:24px;overflow-x:auto;scrollbar-width:none;border:1px solid var(--border);}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{padding:9px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;
      white-space:nowrap;color:var(--muted);border:none;background:none;transition:all .2s;font-family:var(--font);}
    .tab:hover{color:var(--text);background:var(--surface2);}
    .tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 12px rgba(59,130,246,.35);}
    .badge{background:rgba(239,68,68,.9);color:#fff;border-radius:999px;padding:1px 7px;font-size:11px;margin-left:4px;}

    /* ── BUTTONS ── */
    .btn{padding:10px 18px;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;
      transition:all .2s;font-family:var(--font);display:inline-flex;align-items:center;gap:6px;}
    .btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3);}
    .btn:active{transform:translateY(0);}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
    .btn-success{background:linear-gradient(135deg,#059669,#10b981);color:#fff;}
    .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
    .btn-danger{background:linear-gradient(135deg,#b91c1c,#ef4444);color:#fff;}
    .btn-sm{padding:6px 12px;font-size:12px;}
    .btn-easy{background:#86efac;color:#14532d;font-weight:700;}
    .btn-hard{background:#fdba74;color:#78350f;font-weight:700;}
    .btn-again{background:#fca5a5;color:#7f1d1d;font-weight:700;}

    /* ── BOXES ── */
    .box{background:var(--surface);padding:22px;border-radius:var(--radius);border:1px solid var(--border);}
    .box h3{margin-bottom:16px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
    .col-gap{display:flex;flex-direction:column;gap:16px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

    /* ── FORMS ── */
    input,textarea,select{width:100%;padding:10px 14px;border-radius:var(--radius-sm);
      border:1px solid var(--border);background:var(--bg);color:var(--text);
      font-size:14px;font-family:var(--font);margin-bottom:10px;outline:none;transition:border-color .2s;}
    input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.1);}
    label{font-size:12px;color:var(--muted);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.5px;}

    /* ── STAT CARDS ── */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;}
    .stat-card{background:var(--surface);border-radius:var(--radius);padding:16px 12px;text-align:center;
      border:1px solid var(--border);position:relative;overflow:hidden;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
    .stat-card.blue::before{background:linear-gradient(90deg,var(--accent),var(--accent2));}
    .stat-card.red::before{background:linear-gradient(90deg,#ef4444,#f97316);}
    .stat-card.green::before{background:linear-gradient(90deg,#10b981,#059669);}
    .stat-card.yellow::before{background:linear-gradient(90deg,#f59e0b,#f97316);}
    .stat-card.purple::before{background:linear-gradient(90deg,#8b5cf6,#6366f1);}
    .stat-card.orange::before{background:linear-gradient(90deg,#f97316,#f59e0b);}
    .stat-val{font-size:26px;font-weight:700;font-family:var(--mono);margin-bottom:4px;}
    .stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}

    /* ── PROGRESS ── */
    .progress-bar{height:6px;background:var(--surface2);border-radius:999px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s;}

    /* ── TAGS ── */
    .tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;
      font-size:11px;font-weight:600;border:1px solid;margin:2px;}

    /* ── FLASHCARD ── */
    .fc-wrap{perspective:1200px;max-width:540px;margin:20px auto;}
    .fc{position:relative;height:240px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);cursor:pointer;}
    .fc.flipped{transform:rotateY(180deg);}
    .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;
      display:flex;align-items:center;justify-content:center;text-align:center;
      padding:28px;font-size:20px;line-height:1.65;box-shadow:0 12px 40px rgba(0,0,0,.4);}
    .face.front{background:linear-gradient(135deg,#0f2a4a,#162944);border:1px solid var(--border);}
    .face.back{background:linear-gradient(135deg,#0a2e1e,#0f3a26);color:#d1fae5;transform:rotateY(180deg);border:1px solid #065f46;}
    .review-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
    .review-actions .btn{min-width:100px;justify-content:center;flex-direction:column;gap:2px;padding:12px 16px;line-height:1.2;}
    .review-actions .btn small{font-weight:400;font-size:11px;opacity:.8;}

    /* ── CLAUDE ── */
    .claude-answer{background:var(--bg);border-radius:var(--radius-sm);padding:16px;
      white-space:pre-wrap;line-height:1.75;min-height:80px;font-size:14px;
      border:1px solid var(--border);color:var(--text);}
    .actions-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}

    /* ── SPINNER ── */
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);
      border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── SCHEDULE ── */
    .sched-wrap{overflow-x:auto;padding-bottom:8px;}
    .sched-grid{display:grid;grid-template-columns:58px repeat(7,1fr);gap:3px;min-width:560px;}
    .sched-hdr{text-align:center;padding:8px 2px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;}
    .sched-hdr.today-hdr{color:var(--accent);}
    .sched-time{font-size:10px;color:var(--muted);text-align:right;padding-right:6px;
      display:flex;align-items:center;justify-content:flex-end;font-family:var(--mono);}
    .sched-cell{height:36px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);
      cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;
      font-size:10px;font-weight:700;text-align:center;padding:2px 3px;overflow:hidden;line-height:1.1;}
    .sched-cell:hover{border-color:var(--accent);background:rgba(59,130,246,.1);}
    .sched-cell.filled{border-width:1px;}

    /* ── POMODORO ── */
    .pomo-wrap{text-align:center;padding:24px 16px;}
    .timer-ring{width:200px;height:200px;border-radius:50%;border:5px solid var(--surface2);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      margin:0 auto 24px;position:relative;transition:border-color .5s;}
    .timer-ring::before{content:'';position:absolute;inset:-5px;border-radius:50%;
      background:conic-gradient(var(--ring-color,var(--accent)) var(--ring-pct,100%),transparent 0);
      z-index:-1;transition:--ring-pct .5s;}
    .timer-num{font-size:46px;font-weight:700;font-family:var(--mono);letter-spacing:-2px;}
    .timer-lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
    .mode-btns{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
    .mode-btn{padding:7px 18px;border-radius:999px;border:1px solid var(--border);background:transparent;
      color:var(--muted);cursor:pointer;font-size:12px;font-weight:700;transition:all .2s;font-family:var(--font);}
    .mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .timer-ctrl{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

    /* ── HISTORY ITEM ── */
    .hist-item{padding:14px;border-radius:var(--radius-sm);background:var(--bg);margin-bottom:8px;border:1px solid var(--border);}
    .hist-prompt{font-size:12px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
    .hist-answer{font-size:13px;line-height:1.65;color:var(--text);}
    .hist-date{font-size:11px;color:var(--muted);margin-top:6px;font-family:var(--mono);}

    /* ── QUESTION ITEM ── */
    .q-item{padding:14px;border-radius:var(--radius-sm);background:var(--bg);margin-bottom:8px;border:1px solid var(--border);}
    .q-resposta{margin-top:10px;padding:10px 14px;border-radius:var(--radius-sm);
      background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2);
      display:none;font-size:13px;line-height:1.6;}
    .q-resposta.open{display:block;}

    /* ── FC LIST ITEM ── */
    .fc-item{padding:14px;border-radius:var(--radius-sm);background:var(--bg);margin-bottom:8px;border:1px solid var(--border);}
    .fc-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}

    /* ── BAR CHART ── */
    .bar-chart{display:flex;gap:8px;align-items:flex-end;height:90px;margin-bottom:8px;}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
    .bar-fill{width:100%;border-radius:4px 4px 0 0;transition:height .4s;min-height:2px;}
    .bar-day{font-size:10px;color:var(--muted);}

    /* ── LOG BAR ── */
    .log-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .log-lbl{min-width:90px;font-size:12px;truncate:ellipsis;overflow:hidden;white-space:nowrap;}
    .log-bar{height:22px;border-radius:6px;min-width:4px;display:flex;align-items:center;padding:0 8px;
      font-size:11px;font-weight:700;color:#fff;transition:width .4s;}

    /* ── NOTIFICATION ── */
    .notif{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;font-size:14px;
      font-weight:700;z-index:9999;animation:slideIn .3s ease;box-shadow:0 8px 30px rgba(0,0,0,.4);}
    @keyframes slideIn{from{transform:translateX(120px);opacity:0;}to{transform:translateX(0);opacity:1;}}

    /* ── EMPTY ── */
    .empty{text-align:center;padding:32px;color:var(--muted);font-size:14px;line-height:2;}

    /* ── SECTION HEADER ── */
    .sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
    .sec-title{font-size:17px;font-weight:700;}

    /* ── LOGIN ── */
    .login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .login-card{background:var(--surface);padding:44px;border-radius:20px;text-align:center;
      max-width:380px;width:100%;border:1px solid var(--border);box-shadow:0 24px 80px rgba(0,0,0,.5);}
    .login-card h1{font-size:30px;margin-bottom:8px;}
    .login-card p{color:var(--muted);margin-bottom:28px;line-height:1.6;}
    .login-icon{font-size:52px;margin-bottom:16px;}

    /* ── RESPONSIVE ── */
    @media(max-width:768px){
      .grid2,.grid3{grid-template-columns:1fr;}
      .tab{padding:8px 10px;font-size:12px;}
      .timer-ring{width:160px;height:160px;}
      .timer-num{font-size:36px;}
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let sb=null, currentUser=null;
let store={
  temas:[],flashcards:[],claudeHistory:[],questoes:[],resumos:[],
  cronograma:{},   // { "Seg":{ "08:00":{ tema:"...", cor:"#..." } } }
  studyLog:[],     // [{ date, tema, minutes, reviews }]
  streak:{ lastDate:null, count:0 }
};
let reviewList=[], reviewIndex=0, flipped=false;
let activeTab='dashboard';

// Pomodoro
let pomo={
  mode:'work', running:false, seconds:25*60,
  interval:null, cycles:0, selectedTema:'Geral',
  totalSeconds:25*60, startTime:null, elapsed:0
};

// ── CONFIG ──────────────────────────────────────
const COLORS=['#3b82f6','#6366f1','#ec4899','#f59e0b','#10b981','#ef4444','#8b5cf6','#14b8a6','#f97316','#06b6d4'];
const DAYS_SHORT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const SLOTS=['05:00','06:00','07:00','08:00','09:00','10:00','11:00','12:00',
             '13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00','23:00'];
const POMO_DURATIONS={work:25*60,short:5*60,long:15*60};
const POMO_LABELS={work:'⏳ Foco',short:'☕ Pausa Curta',long:'🛌 Pausa Longa'};
const POMO_NAMES={work:'Foco',short:'Pausa Curta',long:'Pausa Longa'};

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function todayStr(){ return new Date().toISOString().slice(0,10); }
function esc(v){ return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function getTemaColor(tema){
  const idx=store.temas.indexOf(tema);
  return COLORS[idx>=0?idx%COLORS.length:Math.abs(hashStr(tema))%COLORS.length];
}
function hashStr(s){ let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return Math.abs(h); }
function notify(msg,bg='#3b82f6'){
  const el=document.createElement('div');
  el.className='notif'; el.style.background=bg; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2800);
}
function fmtTime(secs){ const m=Math.floor(secs/60),s=secs%60; return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
function fmtDate(iso){ return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }

// ═══════════════════════════════════════════════
// INIT / AUTH
// ═══════════════════════════════════════════════
async function init(){
  try{
    const res=await fetch('/api/supabase-config',{cache:'no-store'});
    const cfg=await res.json();
    sb=window.supabase.createClient(cfg.url,cfg.anonKey);
    sb.auth.onAuthStateChange((_,session)=>{
      if(session){ currentUser=session.user; loadApp(session.user); }
      else{ currentUser=null; showLogin(); }
    });
    const{data:{session}}=await sb.auth.getSession();
    if(session){ currentUser=session.user; loadApp(session.user); }
    else showLogin();
  }catch(e){ showLogin(); }
}

function showLogin(){
  document.getElementById('app').innerHTML=`
    <div class="login-page">
      <div class="login-card">
        <div class="login-icon">🎓</div>
        <h1>ConcursoPrep</h1>
        <p>Sua plataforma completa de estudos com IA e método Anki — flashcards, cronograma, pomodoro e muito mais.</p>
        <button class="btn btn-primary" id="btnLogin" style="width:100%;justify-content:center;padding:14px;font-size:15px;">
          🔐 Entrar com Google
        </button>
      </div>
    </div>`;
  document.getElementById('btnLogin').addEventListener('click',()=>{
    sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin}});
  });
}

async function loadApp(user){
  let{data}=await sb.from('user_data').select('*').eq('id',user.id).single();
  if(!data){
    await sb.from('user_data').insert({id:user.id,data:store});
    data={data:store};
  }
  const d=data.data||{};
  store={
    temas:Array.isArray(d.temas)?d.temas:[],
    flashcards:Array.isArray(d.flashcards)?d.flashcards:[],
    claudeHistory:Array.isArray(d.claudeHistory)?d.claudeHistory:[],
    questoes:Array.isArray(d.questoes)?d.questoes:[],
    resumos:Array.isArray(d.resumos)?d.resumos:[],
    cronograma:(d.cronograma&&typeof d.cronograma==='object')?d.cronograma:{},
    studyLog:Array.isArray(d.studyLog)?d.studyLog:[],
    streak:(d.streak&&typeof d.streak==='object')?d.streak:{lastDate:null,count:0}
  };
  checkStreak();
  prepareReview();
  renderApp();
}

async function saveStore(){
  if(!currentUser)return;
  await sb.from('user_data').update({data:store,updated_at:new Date().toISOString()}).eq('id',currentUser.id);
}

async function logout(){
  clearInterval(pomo.interval);
  await sb.auth.signOut();
  location.reload();
}

// ═══════════════════════════════════════════════
// STREAK
// ═══════════════════════════════════════════════
function checkStreak(){
  const today=todayStr();
  if(store.streak.lastDate===today)return;
  const yd=new Date(); yd.setDate(yd.getDate()-1);
  const yStr=yd.toISOString().slice(0,10);
  if(store.streak.lastDate===yStr) store.streak.count++;
  else store.streak.count=1;
  store.streak.lastDate=today;
  saveStore();
}

// ═══════════════════════════════════════════════
// REVIEW / ANKI
// ═══════════════════════════════════════════════
function prepareReview(){
  const today=todayStr();
  reviewList=store.flashcards.filter(fc=>!fc.nextReview||fc.nextReview<=today);
  reviewIndex=0; flipped=false;
}
function curCard(){ return reviewList[reviewIndex]||null; }

function calcNext(card,grade){
  if(grade==='again'){ card.interval=1; card.repetitions=0; }
  else if(grade==='hard'){ card.repetitions=(card.repetitions||0)+1; card.interval=Math.max(2,(card.interval||1)+2); }
  else{ card.repetitions=(card.repetitions||0)+1; card.interval=card.interval<=0?4:Math.round(card.interval*2.2); }
  const next=new Date(); next.setDate(next.getDate()+card.interval);
  card.nextReview=next.toISOString().slice(0,10);
  card.lastReviewed=todayStr();
  if(!Array.isArray(card.history))card.history=[];
  card.history.push({date:todayStr(),grade,interval:card.interval});
}

async function reviewCard(grade){
  const due=curCard(); if(!due)return;
  const real=store.flashcards.find(f=>f.id===due.id); if(!real)return;
  calcNext(real,grade);
  logStudy(real.tema||'Geral',0,1);
  await saveStore();
  reviewIndex++; flipped=false;
  if(reviewIndex>=reviewList.length) prepareReview();
  renderTab();
}

// ═══════════════════════════════════════════════
// STUDY LOG
// ═══════════════════════════════════════════════
function logStudy(tema,minutes,reviews){
  const e=store.studyLog.find(l=>l.date===todayStr()&&l.tema===tema);
  if(e){ e.minutes=(e.minutes||0)+minutes; e.reviews=(e.reviews||0)+reviews; }
  else store.studyLog.push({date:todayStr(),tema,minutes,reviews});
  store.studyLog=store.studyLog.slice(-500);
}

// ═══════════════════════════════════════════════
// CLAUDE IA
// ═══════════════════════════════════════════════
async function callClaude(system,userMsg){
  const r=await fetch('/api/chat',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-3-5-sonnet-20241022',max_tokens:1400,system,messages:[{role:'user',content:userMsg}]})
  });
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||'Erro ao consultar Claude');
  return d.content?.[0]?.text||'';
}
function extractJson(text){
  const clean=text.replace(/```json/g,'').replace(/```/g,'').trim();
  const a=clean.indexOf('['),b=clean.lastIndexOf(']');
  if(a<0||b<0)throw new Error('JSON inválido');
  return JSON.parse(clean.slice(a,b+1));
}

async function askClaude(){
  const prompt=document.getElementById('claudePrompt')?.value.trim();
  const el=document.getElementById('claudeResult'); if(!prompt||!el)return;
  el.innerHTML='<span class="spinner"></span> Consultando Claude...';
  try{
    const ans=await callClaude('Você é um professor especialista em concursos públicos do Brasil. Responda em português, de forma clara, didática e organizada.',prompt);
    el.textContent=ans;
    store.claudeHistory.unshift({id:crypto.randomUUID(),prompt,answer:ans,createdAt:new Date().toISOString()});
    store.claudeHistory=store.claudeHistory.slice(0,30);
    await saveStore(); notify('✅ Resposta recebida!');
  }catch(e){ el.textContent='Erro: '+e.message; }
}

async function gerarFlashcards(){
  const prompt=document.getElementById('claudePrompt')?.value.trim();
  const el=document.getElementById('claudeResult'); if(!prompt||!el)return;
  el.innerHTML='<span class="spinner"></span> Gerando flashcards com IA...';
  try{
    const text=await callClaude('Crie 6 flashcards para concurso em português. Responda SOMENTE JSON array: [{"tema":"...","front":"...","back":"..."}]',prompt);
    const arr=extractJson(text); let n=0;
    arr.forEach(item=>{ if(item.front&&item.back){ store.flashcards.push(mkCard(item.front,item.back,item.tema||'Claude')); n++; } });
    await saveStore(); prepareReview();
    el.textContent=`✅ ${n} flashcards criados!`;
    notify(`🎴 ${n} flashcards criados!`,'#6366f1');
    renderTab();
  }catch(e){ el.textContent='Erro: '+e.message; }
}

function mkCard(front,back,tema){
  return{id:crypto.randomUUID(),tema:tema||'',front,back,interval:0,repetitions:0,nextReview:todayStr(),lastReviewed:null,history:[]};
}
async function addFlashcard(){
  const tema=document.getElementById('fcTema')?.value.trim();
  const front=document.getElementById('fcFrente')?.value.trim();
  const back=document.getElementById('fcVerso')?.value.trim();
  if(!front||!back){ notify('Preencha frente e verso!','#ef4444'); return; }
  store.flashcards.push(mkCard(front,back,tema));
  if(tema&&!store.temas.includes(tema)) store.temas.push(tema);
  document.getElementById('fcTema').value='';
  document.getElementById('fcFrente').value='';
  document.getElementById('fcVerso').value='';
  prepareReview(); await saveStore(); notify('🎴 Flashcard criado!'); renderTab();
}
async function deleteFlashcard(id){
  if(!confirm('Excluir este flashcard?'))return;
  store.flashcards=store.flashcards.filter(f=>f.id!==id);
  prepareReview(); await saveStore(); renderTab();
}

async function addTema(){

  await saveStore(); renderTab();
}

// POMODORO
// ═══════════════════════════════════════════════
function pomoStart(){
  if(pomo.running)return;
  pomo.running=true;
  pomo.startTime=Date.now()-pomo.elapsed*1000;
  pomo.interval=setInterval(()=>{
    pomo.elapsed=Math.floor((Date.now()-pomo.startTime)/1000);
    pomo.seconds=Math.max(0,pomo.totalSeconds-pomo.elapsed);
    updatePomoDisplay();
    if(pomo.seconds<=0){ clearInterval(pomo.interval); pomo.running=false; pomoEnd(); }
  },250);
  updatePomoDisplay();
}
function pomoPause(){
  clearInterval(pomo.interval); pomo.running=false; updatePomoDisplay();
}
function pomoReset(){
  clearInterval(pomo.interval); pomo.running=false; pomo.elapsed=0;
  pomo.seconds=pomo.totalSeconds; updatePomoDisplay();
}
function pomoSetMode(mode){
  clearInterval(pomo.interval); pomo.running=false;
  pomo.mode=mode; pomo.elapsed=0;
  pomo.totalSeconds=POMO_DURATIONS[mode];
  pomo.seconds=pomo.totalSeconds;
  renderTab();
}
async function pomoEnd(){
  pomo.cycles++;
  if(pomo.mode==='work'){
    const mins=25;
    logStudy(pomo.selectedTema||'Geral',mins,0);
    await saveStore();
    notify('🎉 Pomodoro concluído! Hora do intervalo.','#10b981');
    pomoSetMode(pomo.cycles%4===0?'long':'short');
  }else{
    notify('⏰ Intervalo acabou! Hora de estudar.','#f97316');
    pomoSetMode('work');
  }
}
function updatePomoDisplay(){
  const mEl=document.getElementById('pomoTime'); if(!mEl)return;
  mEl.textContent=fmtTime(pomo.seconds);
  const ring=document.getElementById('pomoRing');
  const lbl=document.getElementById('pomoLbl');
  const sBtn=document.getElementById('pomoStart');
  const pBtn=document.getElementById('pomoPause');
  const colors={work:'#ef4444',short:'#10b981',long:'#3b82f6'};
  if(ring)ring.style.borderColor=colors[pomo.mode];
  if(lbl)lbl.textContent=POMO_NAMES[pomo.mode];
  if(sBtn)sBtn.style.display=pomo.running?'none':'inline-flex';
  if(pBtn)pBtn.style.display=pomo.running?'inline-flex':'none';
}

function toggleCell(day,slot){
  if(!store.cronograma[day])store.cronograma[day]={};
  if(store.cronograma[day][slot]){
    delete store.cronograma[day][slot];
  }else{
    const sel=document.getElementById('schedTema');
    const tema=sel?.value||store.temas[0]||'Estudo';
    store.cronograma[day][slot]={tema,cor:getTemaColor(tema)};
  }
  saveStore(); renderScheduleGrid();
}
async function clearSchedule(){
  if(!confirm('Limpar todo o cronograma?'))return;
  store.cronograma={}; await saveStore(); renderTab();
}
function renderScheduleGrid(){
  const wrap=document.getElementById('schedWrap'); if(!wrap)return;
  const todayIdx=new Date().getDay();
  let html='<div class="sched-grid">';
  // Header row
  html+='<div class="sched-hdr"></div>';
  DAYS_SHORT.forEach((d,i)=>{ html+=`<div class="sched-hdr ${i===todayIdx?'today-hdr':''}">${d}${i===todayIdx?' ●':''}</div>`; });
  // Slot rows
  SLOTS.forEach(slot=>{
    html+=`<div class="sched-time">${slot}</div>`;
    DAYS_SHORT.forEach(day=>{
      const cell=store.cronograma[day]?.[slot];
      const bg=cell?cell.cor:'';
      const lbl=cell?cell.tema.slice(0,7):'';
      html+=`<div class="sched-cell ${cell?'filled':''}" 
        style="${cell?`background:${bg}22;border-color:${bg};color:${bg};`:''}"
        onclick="toggleCell('${day}','${slot}')">${esc(lbl)}</div>`;
    });
  });
  html+='</div>';
  wrap.innerHTML=html;
}

    case 'flashcards': el.innerHTML=tabFlashcards(); break;

function tabDashboard(){
  const total=store.flashcards.length;
  const due=reviewList.length;
  const studied=store.flashcards.filter(f=>f.lastReviewed===todayStr()).length;
  const todayMins=store.studyLog.filter(l=>l.date===todayStr()).reduce((a,l)=>a+(l.minutes||0),0);
  const questoes=store.questoes.length;

  // 7-day bar chart
  const last7=[...Array(7)].map((_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-6+i);
    const ds=d.toISOString().slice(0,10);
    const entries=store.studyLog.filter(l=>l.date===ds);
    return{ds,d,mins:entries.reduce((a,l)=>a+(l.minutes||0),0),reviews:entries.reduce((a,l)=>a+(l.reviews||0),0)};
  });
  const maxM=Math.max(...last7.map(d=>d.mins),1);

  // Next 7 days upcoming
  const nxt7=[...Array(7)].map((_,i)=>{
    const d=new Date(); d.setDate(d.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    return{ds,count:store.flashcards.filter(f=>f.nextReview===ds).length,label:i===0?'Hoje':i===1?'Amanhã':DAYS_SHORT[d.getDay()]};
  });
  const maxN=Math.max(...nxt7.map(d=>d.count),1);

  // Tema breakdown
  const temas=store.temas.map(tema=>{
    const fcs=store.flashcards.filter(f=>f.tema===tema);
    const dueT=fcs.filter(f=>!f.nextReview||f.nextReview<=todayStr()).length;
    return{tema,total:fcs.length,due:dueT,pct:fcs.length>0?Math.round(((fcs.length-dueT)/fcs.length)*100):0};
  }).filter(t=>t.total>0);

  return `
    <div class="col-gap">
      <div class="stat-grid">
        <div class="stat-card blue"><div class="stat-val">${total}</div><div class="stat-lbl">Flashcards</div></div>
        <div class="stat-card red"><div class="stat-val" style="color:#f87171;">${due}</div><div class="stat-lbl">Para Revisar</div></div>
        <div class="stat-card green"><div class="stat-val" style="color:#34d399;">${studied}</div><div class="stat-lbl">Revisados Hoje</div></div>
        <div class="stat-card yellow"><div class="stat-val" style="color:#fbbf24;">${todayMins}m</div><div class="stat-lbl">Pomodoro Hoje</div></div>
        <div class="stat-card purple"><div class="stat-val" style="color:#a78bfa;">${questoes}</div><div class="stat-lbl">Questões</div></div>
        <div class="stat-card orange"><div class="stat-val" style="color:#fb923c;">${store.streak.count}🔥</div><div class="stat-lbl">Sequência</div></div>
      </div>

      ${due>0?`
      <div class="box" style="background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(99,102,241,.1));border-color:rgba(59,130,246,.4);">
        <h3 style="color:#60a5fa;">🔔 Você tem ${due} flashcard${due!==1?'s':''} para revisar hoje!</h3>
        <button class="btn btn-primary" onclick="goTab('review')">Iniciar Revisão →</button>
      </div>`:''}

      <div class="grid2">
        <div class="box">
          <h3>📊 Atividade (7 dias)</h3>
          <div class="bar-chart">
            ${last7.map(d=>{
              const h=Math.max(4,Math.round((d.mins/maxM)*80));
              const isT=d.ds===todayStr();
              return `<div class="bar-col">
                <div class="bar-fill" style="height:${h}px;background:${isT?'var(--accent)':'#1e3a5f'};"></div>
                <div class="bar-day">${DAYS_SHORT[d.d.getDay()]}</div>
              </div>`;
            }).join('')}
          </div>
          <div style="font-size:11px;color:var(--muted);">Minutos de foco por dia</div>
        </div>

        <div class="box">
          <h3>📅 Próximas Revisões</h3>
          ${nxt7.map(u=>`
            <div class="log-row">
              <div class="log-lbl" style="font-size:12px;color:var(--muted);">${u.label}</div>
              <div class="log-bar" style="width:${Math.max(4,(u.count/maxN)*160)}px;background:${u.count>0?'var(--accent)':'var(--surface2)'};">
                ${u.count>0?u.count:''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      ${temas.length?`
      <div class="box">
        <h3>📚 Progresso por Tema</h3>
        <div class="col-gap" style="gap:12px;">
          ${temas.map(t=>`
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;">

          ${card.tema?`<span style="background:${cor}18;color:${cor};border:1px solid ${cor}44;border-radius:999px;padding:5px 16px;font-size:12px;font-weight:700;">${esc(card.tema)}</span><br><br>`:''}

          <div class="fc-wrap">
            <div class="fc ${flipped?'flipped':''}" id="ankiCard">
              <div class="face front">${esc(card.front)}</div>
              <div class="face back">${esc(card.back)}</div>
            </div>
          </div>

          <p style="font-size:12px;color:var(--muted);margin-bottom:20px;">
            ${flipped?'Como foi? Avalie sua resposta:':'Clique no cartão para ver a resposta'}
          </p>

          <div class="review-actions" style="${flipped?'':'display:none;'}">
            <button class="btn btn-again" data-grade="again">😰 De novo<br><small>+1 dia</small></button>
            <button class="btn btn-hard" data-grade="hard">😐 Difícil<br><small>+2 dias</small></button>
            <button class="btn btn-easy" data-grade="easy">😊 Fácil<br><small>×2.2 dias</small></button>
          </div>
        </div>
      </div>

      <div class="box">
        <h3 style="font-size:13px;">ℹ️ Detalhes do Card</h3>
        <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:12px;color:var(--muted);">
          <span>📅 Próxima revisão: <strong style="color:var(--text);">${card.nextReview||'Hoje'}</strong></span>
          <span>🔁 Repetições: <strong style="color:var(--text);">${card.repetitions||0}</strong></span>
          <span>📆 Intervalo atual: <strong style="color:var(--text);">${card.interval||0} dias</strong></span>
        </div>
      </div>
    </div>`;
}
function setupReviewEvents(){
  document.getElementById('ankiCard')?.addEventListener('click',()=>{ flipped=!flipped; renderTab(); });
  document.querySelectorAll('[data-grade]').forEach(b=>b.addEventListener('click',()=>reviewCard(b.dataset.grade)));
}

// ═══════════════════════════════════════════════
// TAB: SCHEDULE
// ═══════════════════════════════════════════════
function tabSchedule(){
  // Count total scheduled blocks per tema
  const temaCounts={};
  DAYS_SHORT.forEach(d=>{ SLOTS.forEach(s=>{ const c=store.cronograma[d]?.[s]; if(c) temaCounts[c.tema]=(temaCounts[c.tema]||0)+1; }); });

  return `
    <div class="col-gap">
      <div class="box">
        <h3>📅 Cronograma Interativo Semanal</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">
          Selecione o tema abaixo e clique nas células para montar seu cronograma. Clique novamente para remover.
        </p>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
          <label style="margin:0;white-space:nowrap;">Tema ativo:</label>
          <select id="schedTema" style="width:auto;margin:0;">
            ${store.temas.length
              ? store.temas.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('')
              : '<option value="Estudo Geral">Estudo Geral</option>'
            }
          </select>
          <button class="btn btn-danger btn-sm" onclick="clearSchedule()">🗑️ Limpar tudo</button>
        </div>
        <div id="schedWrap" class="sched-wrap"></div>
      </div>

      <div class="box">
        <h3>📊 Resumo Semanal</h3>
        ${Object.keys(temaCounts).length
          ? `<div style="display:flex;flex-wrap:wrap;gap:10px;">
            ${Object.entries(temaCounts).map(([tema,count])=>`
              <div style="background:${getTemaColor(tema)}18;border:1px solid ${getTemaColor(tema)}44;border-radius:12px;padding:12px 18px;">
                <div style="color:${getTemaColor(tema)};font-weight:700;font-size:14px;">${esc(tema)}</div>
                <div style="font-size:12px;color:var(--muted);margin-top:2px;">${count}h por semana</div>
              </div>`).join('')}
          </div>`
          : '<div class="empty">Nenhum bloco agendado ainda.<br>Clique nas células do cronograma para adicionar.</div>'
        }
      </div>

      <div class="box">
        <h3>💡 Dicas de Planejamento</h3>
        <ul style="padding-left:20px;line-height:2.2;font-size:13px;color:var(--muted);">
          <li>Estude os temas mais difíceis pela <strong style="color:var(--text);">manhã</strong>, quando o cérebro está mais fresco</li>
          <li>Distribua os temas ao longo da semana em vez de concentrar tudo num dia</li>
          <li>Reserve blocos fixos para <strong style="color:var(--text);">revisão Anki</strong> todos os dias</li>
          <li>Use o <strong style="color:var(--text);">Pomodoro</strong> dentro dos blocos agendados</li>
          <li>Alterne temas para manter o cérebro engajado (aprendizado intercalado)</li>
        </ul>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════
// TAB: POMODORO
// ═══════════════════════════════════════════════
function tabPomodoro(){
  const today=todayStr();
  const todayLog=store.studyLog.filter(l=>l.date===today);
  const todayMins=todayLog.reduce((a,l)=>a+(l.minutes||0),0);
  const maxLog=Math.max(...todayLog.map(l=>l.minutes||0),1);
  const ringColor={work:'#ef4444',short:'#10b981',long:'#3b82f6'}[pomo.mode];
  const pct=Math.round((1-(pomo.seconds/pomo.totalSeconds))*100);

  return `
    <div class="col-gap">
      <div class="box">
        <div class="mode-btns">
          ${Object.entries(POMO_LABELS).map(([key,lbl])=>`
            <button class="mode-btn ${pomo.mode===key?'active':''}" onclick="pomoSetMode('${key}')">${lbl}</button>
          `).join('')}
        </div>

        <div class="pomo-wrap">
          <div class="timer-ring" id="pomoRing" style="border-color:${ringColor};position:relative;">
            <svg style="position:absolute;inset:-5px;width:calc(100%+10px);height:calc(100%+10px);" viewBox="0 0 210 210">
              <circle cx="105" cy="105" r="100" fill="none" stroke="${ringColor}22" stroke-width="5"/>
              <circle cx="105" cy="105" r="100" fill="none" stroke="${ringColor}" stroke-width="5"
                stroke-dasharray="${Math.PI*200}" stroke-dashoffset="${Math.PI*200*(1-pct/100)}"
                stroke-linecap="round" transform="rotate(-90 105 105)" style="transition:.5s;"/>
            </svg>
            <div class="timer-num" id="pomoTime">${fmtTime(pomo.seconds)}</div>
            <div class="timer-lbl" id="pomoLbl">${POMO_NAMES[pomo.mode]}</div>
          </div>

          <div style="margin-bottom:18px;">
            <label style="display:inline;">Tema:</label>
            <select id="pomoTema" style="display:inline;width:auto;margin:0 0 0 8px;" onchange="pomo.selectedTema=this.value">
              <option value="Geral">Geral</option>
              ${store.temas.map(t=>`<option value="${esc(t)}" ${pomo.selectedTema===t?'selected':''}>${esc(t)}</option>`).join('')}
            </select>
          </div>

          <div class="timer-ctrl">
            <button id="pomoStart" class="btn btn-primary" style="${pomo.running?'display:none;':''}">▶ Iniciar</button>
            <button id="pomoPause" class="btn btn-secondary" style="${pomo.running?'':'display:none;'}">⏸ Pausar</button>
            <button class="btn btn-ghost" onclick="pomoReset();updatePomoDisplay();">↺ Reiniciar</button>
          </div>
        </div>

        <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
          <div class="stat-card" style="min-width:110px;padding:12px;">
            <div class="stat-val" style="font-size:22px;">${pomo.cycles}</div>
            <div class="stat-lbl">Pomodoros</div>
          </div>
          <div class="stat-card" style="min-width:110px;padding:12px;">
            <div class="stat-val" style="font-size:22px;">${todayMins}m</div>
            <div class="stat-lbl">Foco Hoje</div>
          </div>
        </div>
      </div>

      ${todayLog.length?`
      <div class="box">
        <h3>📊 Estudo de Hoje por Tema</h3>
        ${todayLog.map(l=>`
          <div class="log-row">
            <div class="log-lbl">${esc(l.tema)}</div>
            <div class="log-bar" style="width:${Math.max(4,((l.minutes||0)/maxLog)*200)}px;background:${getTemaColor(l.tema)};">
              ${(l.minutes||0)>0?(l.minutes+'m'):''}
            </div>
            <span style="font-size:11px;color:var(--muted);">${l.reviews||0} rev.</span>
          </div>`).join('')}
      </div>`:''}

      <div class="box">
        <h3>🔬 Como funciona o método Pomodoro</h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:12px;">
          <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:14px;">
            <div style="color:#f87171;font-weight:700;font-size:13px;margin-bottom:4px;">⏳ 25 min — Foco</div>
            <div style="font-size:12px;color:var(--muted);">Estude com foco total. Sem distrações.</div>
          </div>
          <div style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:10px;padding:14px;">
            <div style="color:#34d399;font-weight:700;font-size:13px;margin-bottom:4px;">☕ 5 min — Pausa Curta</div>
            <div style="font-size:12px;color:var(--muted);">Descanse, hidrate, levante.</div>
          </div>
          <div style="background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);border-radius:10px;padding:14px;">
            <div style="color:#60a5fa;font-weight:700;font-size:13px;margin-bottom:4px;">🛌 15 min — Pausa Longa</div>
            <div style="font-size:12px;color:var(--muted);">A cada 4 ciclos. Recuperação profunda.</div>
          </div>
        </div>
        <p style="font-size:12px;color:var(--muted);">O app troca automaticamente os modos ao fim de cada ciclo e salva seu tempo de estudo por tema.</p>
      </div>
    </div>`;
}
function setupPomoEvents(){
  document.getElementById('pomoStart')?.addEventListener('click',pomoStart);
  document.getElementById('pomoPause')?.addEventListener('click',pomoPause);
}

// ═══════════════════════════════════════════════
// TAB: CLAUDE IA
// ═══════════════════════════════════════════════
function tabClaude(){

    <div class="col-gap">

        <h3>🤖 Assistente Claude IA para Concursos</h3>

        <div class="actions-row">

          <button class="btn btn-secondary" id="btnFlashcards">🎴 Gerar Flashcards</button>
          <button class="btn btn-secondary" id="btnQuestoes">❓ Gerar Questões</button>
        </div>
        <div style="margin-top:16px;">
          <div class="claude-answer" id="claudeResult">${lastC?esc(lastC.answer):'💡 Faça uma pergunta, gere um resumo, flashcards ou questões sobre qualquer tema de concurso.'}</div>
        </div>
      </div>

      <div class="grid2">
        <div class="box">
          <h3>📑 Último Resumo</h3>
          <div class="claude-answer" style="font-size:13px;max-height:300px;overflow-y:auto;">
            ${store.resumos[0]?esc(store.resumos[0].text):'<span style="color:var(--muted);">Nenhum resumo gerado ainda.</span>'}
          </div>
        </div>
        <div class="box">
          <h3>❓ Últimas Questões</h3>
          ${store.questoes.slice(0,3).map((q,i)=>`
            <div class="q-item">
              <div style="font-size:13px;font-weight:600;margin-bottom:6px;">Q${i+1}: ${esc(q.pergunta)}</div>
              <button class="btn btn-ghost btn-sm" onclick="this.nextElementSibling.classList.toggle('open')">Ver resposta</button>
              <div class="q-resposta">💡 ${esc(q.resposta)}</div>

        </div>
      </div>
    </div>`;
}
function setupClaudeEvents(){
  document.getElementById('btnClaude')?.addEventListener('click',askClaude);
  document.getElementById('btnResumo')?.addEventListener('click',gerarResumo);
  document.getElementById('btnFlashcards')?.addEventListener('click',gerarFlashcards);
  document.getElementById('btnQuestoes')?.addEventListener('click',gerarQuestoes);
}

// ═══════════════════════════════════════════════
// TAB: HISTORY
// ═══════════════════════════════════════════════
function tabHistory(){
  return `
    <div class="col-gap">
      <div class="box">
        <div class="sec-hdr">
          <div class="sec-title">🤖 Histórico Claude (${store.claudeHistory.length})</div>
          ${store.claudeHistory.length?`<button class="btn btn-danger btn-sm" onclick="clearHist('claude')">Limpar</button>`:''}
        </div>
        ${store.claudeHistory.length
          ? store.claudeHistory.map(h=>`
            <div class="hist-item">
              <div class="hist-prompt">💬 ${esc(h.prompt)}</div>
              <div class="hist-answer">${esc(h.answer).slice(0,350)}${h.answer.length>350?'…':''}</div>
              <div class="hist-date">${fmtDate(h.createdAt)}</div>
            </div>`).join('')
          : '<div class="empty">Nenhuma consulta ainda.</div>'
        }
      </div>

      <div class="box">
        <div class="sec-hdr">
          <div class="sec-title">📝 Resumos (${store.resumos.length})</div>
          ${store.resumos.length?`<button class="btn btn-danger btn-sm" onclick="clearHist('resumos')">Limpar</button>`:''}
        </div>
        ${store.resumos.length
          ? store.resumos.map(r=>`
            <div class="hist-item">
              <div class="hist-prompt">📌 ${esc(r.prompt)}</div>
              <div class="hist-answer">${esc(r.text).slice(0,420)}${r.text.length>420?'…':''}</div>
              <div class="hist-date">${fmtDate(r.createdAt)}</div>
            </div>`).join('')
          : '<div class="empty">Nenhum resumo gerado ainda.</div>'
        }
      </div>

      <div class="box">
        <div class="sec-hdr">
          <div class="sec-title">❓ Questões (${store.questoes.length})</div>
          ${store.questoes.length?`<button class="btn btn-danger btn-sm" onclick="clearHist('questoes')">Limpar</button>`:''}
        </div>
        ${store.questoes.length
          ? store.questoes.map((q,i)=>`
            <div class="q-item">
              <div style="font-size:13px;font-weight:600;margin-bottom:6px;">Q${i+1}: ${esc(q.pergunta)}</div>
              <button class="btn btn-ghost btn-sm" onclick="this.nextElementSibling.classList.toggle('open')">Ver resposta</button>
              <div class="q-resposta">💡 ${esc(q.resposta)}</div>
            </div>`).join('')
          : '<div class="empty">Nenhuma questão gerada ainda.</div>'
        }
      </div>
    </div>`;
}
async function clearHist(type){
  if(!confirm('Limpar este histórico?'))return;
  if(type==='claude')store.claudeHistory=[];
  else if(type==='resumos')store.resumos=[];
  else if(type==='questoes')store.questoes=[];
  await saveStore(); renderTab();
}

// ═══════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════
init();
</script>
</body>
