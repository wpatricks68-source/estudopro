<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ConcursoPrep</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; background:#0f172a; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh;}
    .card { background:#1e293b; padding:30px; border-radius:12px; text-align:center;}
    button { padding:10px 20px; border:none; border-radius:8px; cursor:pointer;}
  </style>
</head>
<body>

<div class="card">
  <h2>ConcursoPrep</h2>
  <p>Login com Google</p>
  <button onclick="loginGoogle()">Entrar com Google</button>
</div>

<script>
let supabase = null;
let currentUser = null;

async function initSupabase(){
  try {
    const res = await fetch('/api/supabase-config');
    const cfg = await res.json();

    supabase = window.supabase.createClient(cfg.url, cfg.anonKey);

    const { data: { session } } = await supabase.auth.getSession();

    if(session){
      console.log("Usuário logado:", session.user);
    }

  } catch(e){
    console.error("Erro init:", e);
  }
}

async function loginGoogle(){
  if(!supabase){
    alert("Supabase não carregou");
    return;
  }

  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin
    }
  });

  if(error){
    console.error(error);
    alert("Erro login");
  }
}

initSupabase();
</script>

</body>
</html>
