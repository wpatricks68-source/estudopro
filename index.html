
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConcursoPrep - MVP Funcional v2</title>
  <style>
    * { box-sizing: border-box; }
    :root{
      --bg:#0b1220; --bg2:#0f172a; --panel:#10192e; --panel2:#0d1527; --line:#22314d;
      --text:#e5eefc; --muted:#94a3b8; --blue:#3b82f6; --cyan:#14b8a6; --green:#10b981;
      --yellow:#f59e0b; --pink:#ec4899; --danger:#ef4444;
    }
    html,body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
    .app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    .sidebar{background:var(--bg2);border-right:1px solid #1f2b44;padding:22px 16px;position:sticky;top:0;height:100vh;overflow:auto}
    .brand{font-size:24px;font-weight:700;margin-bottom:18px}.brand span{color:#60a5fa}
    .menu{display:flex;flex-direction:column;gap:8px}
    .menu button{width:100%;text-align:left;background:#101b31;color:#dbe7fb;border:1px solid var(--line);border-radius:14px;padding:12px 14px;cursor:pointer;font-size:14px}
    .menu button.active{background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;color:white;font-weight:700}
    .main{padding:24px}
    .page{display:none}.page.active{display:block}
    .hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px}
    h1,h2,h3{margin:0 0 8px}
    .hero h1{font-size:32px}
    .sub{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:12px}
    .top-actions,.actions-row,.chips,.toolbar,.nav-row,.stats-row,.inline-row{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:none;border-radius:14px;padding:10px 14px;background:#18243e;color:white;cursor:pointer;border:1px solid var(--line);font-weight:700}
    .btn.primary{background:linear-gradient(135deg,var(--blue),var(--cyan));border:none}
    .btn.ghost{background:#0b1220}
    .btn.danger{background:#30141a;border-color:#5d2730}
    .grid{display:grid;gap:18px}.grid.two{grid-template-columns:1.2fr .8fr}.grid.equal{grid-template-columns:1fr 1fr}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid #202c45;border-radius:24px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.22)}
    input,textarea,select{width:100%;background:#0b1220;border:1px solid var(--line);color:var(--text);border-radius:14px;padding:12px;margin-bottom:10px}
    .toolbar .tool{background:#0b1220;border:1px solid var(--line);color:#dbe7fb;border-radius:12px;padding:8px 12px;font-size:13px;cursor:pointer}
    .editor{min-height:260px;background:#0b1220;border:1px solid var(--line);border-radius:18px;padding:16px;line-height:1.8;outline:none}
    .canvas-wrap{margin-top:14px;padding-top:12px;border-top:1px dashed #33425e}
    canvas{width:100%;height:180px;background:#0b1220;border:2px dashed #33425e;border-radius:14px}
    .chip{padding:6px 10px;border-radius:999px;background:#0b1220;border:1px solid var(--line);color:#b8c7e0;font-size:12px;font-weight:700}
    .question,.review-card,.library-item,.question-item,.meta-card{background:#0b1220;border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:10px}
    .alternatives label{display:block;padding:8px 10px;border:1px solid var(--line);border-radius:12px;margin-top:8px;color:#cfe0fb;cursor:pointer}
    .alt-correct{border-color:var(--green)!important;background:rgba(16,185,129,.10)!important}
    .flashcard{perspective:1000px;margin-top:12px}
    .flashcard-inner{position:relative;height:220px;transform-style:preserve-3d;transition:transform .5s}
    .flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
    .flash-front,.flash-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;padding:18px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:20px;border:1px solid var(--line)}
    .flash-front{background:#0b1220}.flash-back{background:#e5e7eb;color:#111827;transform:rotateY(180deg)}
    .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.weekday{text-align:center;color:#8ea0c1;font-size:12px;padding:4px 0;font-weight:700}
    .day{min-height:106px;background:#0b1220;border:1px solid var(--line);border-radius:16px;padding:8px;cursor:pointer}
    .day.selected{outline:2px solid var(--blue)}
    .daynum{display:flex;justify-content:space-between;font-size:12px;font-weight:700}
    .check{width:14px;height:14px;border:1px solid #5eead4;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#5eead4}
    .ring-wrap{display:flex;justify-content:center;padding:8px 0}
    svg text{font-family:Arial,sans-serif}
    table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:16px;background:#0b1220;border:1px solid var(--line)}
    th,td{border-bottom:1px solid #1e2d47;padding:10px;text-align:left;font-size:14px;color:#d5e3fb}
    th{color:#93a7c9;background:#0f172a}
    .footer-note{margin-top:18px;color:#7f91b1;font-size:13px}
    .uploader{border:1px dashed var(--blue);background:#0b1220;border-radius:18px;padding:14px;margin-top:14px}
    .file-list{margin-top:10px;display:grid;gap:8px}
    .file-pill{padding:10px 12px;border-radius:14px;background:#101b31;border:1px solid var(--line);color:#cfe0fb;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .file-pill .left{display:flex;align-items:center;gap:10px;min-width:0}
    .file-pill .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .search-row{display:grid;grid-template-columns:1fr 180px 180px;gap:10px}
    .small{font-size:12px;color:var(--muted)}
    .hidden{display:none!important}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .tab{padding:8px 12px;border-radius:12px;border:1px solid var(--line);background:#0b1220;cursor:pointer;font-weight:700;color:#dbe7fb}
    .tab.active{background:linear-gradient(135deg,var(--blue),var(--cyan));border:none}
    .tooltip-wrap{position:relative;display:inline-block}
    .tooltip{position:absolute;bottom:115%;left:50%;transform:translateX(-50%);background:#111827;color:#fff;border:1px solid #334155;padding:10px 12px;border-radius:12px;width:260px;font-size:12px;line-height:1.5;display:none;z-index:10;box-shadow:0 10px 25px rgba(0,0,0,.35)}
    .tooltip-wrap:hover .tooltip{display:block}
    .color-palette{display:flex;gap:8px;flex-wrap:wrap}
    .color-swatch{width:28px;height:28px;border-radius:999px;border:2px solid #fff3;cursor:pointer}
    .divider{height:1px;background:#24314d;margin:14px 0}
    .badge{display:inline-block;padding:5px 8px;border-radius:999px;font-size:11px;background:#14203a;color:#9ec5ff;border:1px solid #27416a}
    @media (max-width:980px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.grid.two,.grid.equal,.search-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">Concurso<span>Prep</span></div>
    <div class="menu">
      <button class="active" data-page="estudar">1. Painel de Estudo</button>
      <button data-page="flashcards">2. Flashcards</button>
      <button data-page="revisoes">3. Revisões</button>
      <button data-page="ciclo">4. Ciclo de estudo</button>
      <button data-page="cronograma">5. Cronograma</button>
    </div>
    <div class="footer-note">MVP funcional salvo no navegador.</div>
  </aside>

  <main class="main">
    <section id="estudar" class="page active"></section>
    <section id="flashcards" class="page"></section>
    <section id="revisoes" class="page"></section>
    <section id="ciclo" class="page"></section>
    <section id="cronograma" class="page"></section>
  </main>
</div>

<script>
const KEY = "concursoprep_mvp_v2";
function id(){ return Math.random().toString(36).slice(2,10) }
function todayStr(){ const d = new Date(); return d.toISOString().slice(0,10); }
function esc(s){ return String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }
function inferDisciplina(topic){
  const t = (topic||"").toLowerCase();
  if(t.includes("crase") || t.includes("portugu")) return "Português";
  if(t.includes("lógico") || t.includes("logico") || t.includes("proposição")) return "Raciocínio Lógico";
  if(t.includes("informática") || t.includes("informatica")) return "Informática";
  return "Direito Constitucional";
}
const defaultPanel = (name, topic="", html="") => ({
  id:id(),
  name,
  topic,
  content: html || `<p><strong>Resumo sobre tema informado.</strong></p><p>Use este painel para estudar o assunto, destacar trechos e gerar materiais com IA.</p>`,
  uploads: [],
  selectedUploadIds: [],
  questions: [
    {id:id(), type:"ce", prompt:"O controle concentrado de constitucionalidade é exercido, em regra, pelo STF.", options:["Certo","Errado"], answer:0},
    {id:id(), type:"mc", prompt:"Qual alternativa define controle difuso?", options:["Exercido apenas pelo Senado","Feito em caso concreto por qualquer juiz ou tribunal","Exclusivo do STF em ADI","Aplicado somente em leis municipais"], answer:1}
  ],
  qIndex: 0,
  showAnswer:false,
  showKey:false
});
const state = JSON.parse(localStorage.getItem(KEY) || "null") || {
  study: {
    activePanelId: null,
    panels: [
      defaultPanel("Direito Constitucional","Controle de constitucionalidade",
      `<p>O <span style="background:#fde68a;color:#111827;padding:1px 4px;border-radius:4px;">controle de constitucionalidade</span> é o mecanismo usado para verificar se uma lei ou ato normativo está de acordo com a Constituição.</p>
      <p>Ele pode ser <span style="text-decoration:underline;text-decoration-color:#38bdf8;text-decoration-thickness:2px;">difuso</span> ou <span style="background:#bbf7d0;color:#111827;padding:1px 4px;border-radius:4px;">concentrado</span>.</p>`),
      defaultPanel("Português","Crase"),
      defaultPanel("Raciocínio Lógico","Proposições lógicas")
    ]
  },
  flashcards: [
    {id:id(), disciplina:"Direito Constitucional", tema:"Controle de constitucionalidade", front:"O que é controle difuso de constitucionalidade?", back:"É o controle feito em caso concreto por qualquer juiz ou tribunal.", level:"novo", nextReview:todayStr()},
    {id:id(), disciplina:"Direito Constitucional", tema:"Controle concentrado", front:"Quem julga ADI em regra?", back:"O STF.", level:"novo", nextReview:todayStr()},
    {id:id(), disciplina:"Português", tema:"Crase", front:"Quando ocorre crase?", back:"Quando há fusão da preposição a com artigo feminino a/as.", level:"novo", nextReview:todayStr()}
  ],
  flashSearch: { q:"", disciplina:"Todas", tema:"Todos" },
  flashReviewIndex: 0,
  flashFlipped: false,
  revisions: { amount:10, level:"Fácil", style:"Múltipla escolha" },
  cycle: {
    weights: [
      {disciplina:"Direito Constitucional", peso:25, color:"#f59e0b"},
      {disciplina:"Português", peso:20, color:"#10b981"},
      {disciplina:"Raciocínio Lógico", peso:25, color:"#38bdf8"},
      {disciplina:"Informática", peso:30, color:"#f472b6"}
    ],
    rows: [
      {tempo:"1h", seg:"Constitucional", ter:"Português", qua:"Raciocínio", qui:"Informática", sex:"Constitucional"},
      {tempo:"45min", seg:"Português", ter:"Raciocínio", qua:"Constitucional", qui:"Português", sex:"Raciocínio"}
    ]
  },
  cronograma: {
    selectedDay: 10,
    monthItems: {
      7:[{disciplina:"Direito Constitucional", done:true}],
      9:[{disciplina:"Português", done:true}],
      10:[{disciplina:"Raciocínio Lógico", done:false}],
      12:[{disciplina:"Informática", done:false}]
    }
  }
};
if(!state.study.activePanelId) state.study.activePanelId = state.study.panels[0].id;
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function page(id){ return document.getElementById(id); }
function getActivePanel(){ return state.study.panels.find(p => p.id === state.study.activePanelId) || state.study.panels[0]; }

document.querySelectorAll('.menu button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    page(btn.dataset.page).classList.add('active');
  });
});

function fakeAI(type){
  const panel = getActivePanel();
  const base = panel.topic.trim() || "tema informado";
  const selectedFiles = panel.uploads.filter(f => panel.selectedUploadIds.includes(f.id));
  const files = selectedFiles.length ? " com base no arquivo marcado" : panel.uploads.length ? " com base nos arquivos enviados" : "";
  if(type === "resumo"){
    panel.content = `<p><strong>Resumo sobre ${esc(base)}</strong>${files}.</p><p>${esc(base)} é um conteúdo central para revisão. Organize o estudo por conceito, classificação, exemplos e questões recorrentes.</p><p>Use este painel para destacar os pontos mais cobrados e montar suas revisões.</p>`;
  }
  if(type === "flashcards"){
    const disciplina = inferDisciplina(base);
    for(let i=1;i<=20;i++){
      state.flashcards.unshift({id:id(), disciplina, tema:base, front:`Flashcard ${i}: conceito importante de ${base}?`, back:`Resposta objetiva do flashcard ${i} sobre ${base}.`, level:"novo", nextReview:todayStr()});
    }
  }
  if(type === "questoes"){
    for(let i=1;i<=10;i++){
      panel.questions.push({id:id(), type: i % 2 === 0 ? "ce" : "mc", prompt:`Questão ${i} sobre ${base}.`, options: i % 2 === 0 ? ["Certo","Errado"] : ["Alternativa A","Alternativa correta","Alternativa C","Alternativa D"], answer: i % 2 === 0 ? 0 : 1});
    }
  }
  if(type === "otimizado"){
    fakeAI("resumo");
    fakeAI("flashcards");
    fakeAI("questoes");
  }
  renderAll();
}
function applyCmd(cmd){ document.execCommand(cmd,false,null); }
function wrapSelection(styleText){
  const sel = window.getSelection();
  if(!sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const span = document.createElement("span");
  span.style.cssText = styleText;
  try{ range.surroundContents(span); }
  catch{ document.execCommand("insertHTML", false, `<span style="${styleText}">${sel.toString()}</span>`); }
}
function renderEstudar(){
  const panel = getActivePanel();
  const q = panel.questions[panel.qIndex];
  page('estudar').innerHTML = `
    <div class="hero">
      <div>
        <h1>Painel de Estudo</h1>
        <p>Painel principal com busca por IA, geração de resumo, flashcards, questões, editor rico, estudo otimizado e upload de arquivos para servir de base à IA.</p>
      </div>
      <div class="top-actions">
        <div class="tooltip-wrap">
          <button class="btn primary" id="study-optimized">Estudo Otimizado</button>
          <div class="tooltip">Cria com um clique: <strong>1 resumo</strong>, <strong>10 questões</strong> e <strong>20 flashcards</strong> sobre o assunto do painel atual.</div>
        </div>
        <button class="btn" id="study-save">Salvar conteúdo</button>
      </div>
    </div>

    <div class="tabs">
      ${state.study.panels.map(p => `<button class="tab ${p.id===panel.id?'active':''}" data-panel="${p.id}">${esc(p.name)}</button>`).join('')}
      <button class="tab" id="new-panel">+ Nova disciplina</button>
    </div>

    <div class="grid two">
      <div class="card">
        <h2>${esc(panel.name)}</h2>
        <div class="sub">Digite o tema que o aluno vai estudar e use os atalhos para gerar materiais.</div>
        <textarea id="study-topic" rows="3" placeholder="Ex: Controle de constitucionalidade, princípio da legalidade, crase...">${esc(panel.topic)}</textarea>
        <div class="actions-row">
          <button class="btn primary" id="study-search">Pesquisar com IA</button>
          <button class="btn" id="study-summary">Resumo</button>
          <button class="btn" id="study-flash">Flashcards</button>
          <button class="btn" id="study-questions">Questões</button>
        </div>

        <div class="divider"></div>
        <div class="sub">Cores para destacar</div>
        <div class="color-palette" style="margin-bottom:12px;">
          <button class="color-swatch" data-color="#fde68a" style="background:#fde68a"></button>
          <button class="color-swatch" data-color="#bbf7d0" style="background:#bbf7d0"></button>
          <button class="color-swatch" data-color="#fbcfe8" style="background:#fbcfe8"></button>
          <button class="color-swatch" data-color="#bae6fd" style="background:#bae6fd"></button>
          <button class="color-swatch" data-color="#ddd6fe" style="background:#ddd6fe"></button>
          <button class="color-swatch" data-color="#fed7aa" style="background:#fed7aa"></button>
        </div>

        <div class="toolbar">
          <button class="tool" data-cmd="bold"><strong>B</strong></button>
          <button class="tool" data-cmd="italic"><em>I</em></button>
          <button class="tool" id="tool-underline">Sublinhar</button>
          <button class="tool" id="brush-toggle">Pincel</button>
          <button class="tool" id="eraser-toggle">Borracha</button>
          <button class="tool" id="clear-canvas">Limpar desenho</button>
        </div>

        <div id="study-editor" class="editor" contenteditable="true">${panel.content}</div>
        <div class="canvas-wrap">
          <div>Área para rabiscar por cima do texto:</div>
          <canvas id="draw-canvas" width="900" height="180"></canvas>
        </div>
      </div>

      <div class="card">
        <h2>Base de arquivos para IA</h2>
        <div class="sub">Ao lado de cada arquivo há uma caixinha para marcar o que será usado como base para a pesquisa.</div>
        <div class="uploader">
          <div class="actions-row">
            <button class="btn primary" id="fake-upload">Selecionar arquivos</button>
            <input type="file" id="real-upload" multiple class="hidden">
          </div>
          <div class="small">Neste protótipo, marque apenas os arquivos que quer usar como base.</div>
          <div class="file-list">
            ${panel.uploads.length ? panel.uploads.map(f => `
              <label class="file-pill">
                <div class="left">
                  <input type="checkbox" data-file="${f.id}" ${panel.selectedUploadIds.includes(f.id)?'checked':''}>
                  <div class="name">📄 ${esc(f.name)} <span class="small">(${Math.round(f.size/1024)||1} KB)</span></div>
                </div>
                <span class="badge">${panel.selectedUploadIds.includes(f.id)?'Base ativa':'Inativo'}</span>
              </label>
            `).join('') : `<div class="small">Nenhum arquivo enviado ainda.</div>`}
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <h2>Painel de questões</h2>
      <div class="sub">Questões criadas manualmente ou por IA, com múltipla escolha ou certo/errado e navegação entre questões.</div>
      <div class="chips">
        <span class="chip">Manual</span><span class="chip">Com IA</span><span class="chip">Múltipla escolha</span><span class="chip">Certo ou errado</span>
      </div>

      <div class="question">
        <strong>Questão ${panel.qIndex+1} de ${panel.questions.length}</strong>
        <p>${esc(q.prompt)}</p>
        <div class="alternatives" id="question-options">
          ${q.options.map((opt,i)=>`<label data-i="${i}" class="${panel.showAnswer && i===q.answer ? 'alt-correct' : ''}"><input type="radio" name="active-question"> ${String.fromCharCode(65+i)}) ${esc(opt)}</label>`).join('')}
        </div>
        ${panel.showKey ? `<p class="sub" style="margin-top:10px;">Gabarito: ${q.type === 'ce' ? (q.answer===0?'Certo':'Errado') : String.fromCharCode(65+q.answer)}</p>` : ''}
      </div>

      <div class="inline-row" style="margin-top:12px;justify-content:space-between;align-items:center;">
        <div class="nav-row">
          <button class="btn" id="prev-question">← Voltar</button>
          <button class="btn primary" id="next-question">Próxima questão →</button>
        </div>
        <div class="actions-row">
          <button class="btn" id="toggle-key">${panel.showKey ? 'Ocultar gabarito' : 'Mostrar gabarito'}</button>
          <button class="btn" id="show-correct">Resposta correta</button>
          <button class="btn" id="manual-question">Criar manualmente</button>
          <button class="btn primary" id="add-ai-question">Gerar com IA</button>
        </div>
      </div>
    </div>
  `;
  page('estudar').querySelectorAll('[data-panel]').forEach(btn => btn.onclick = ()=> { state.study.activePanelId = btn.dataset.panel; renderEstudar(); save(); });
  page('estudar').querySelector('#new-panel').onclick = ()=> {
    const name = prompt('Nome da disciplina/painel:', 'Nova disciplina');
    if(!name) return;
    const topic = prompt('Tema inicial desse painel:', '') || '';
    const panelNew = defaultPanel(name, topic);
    state.study.panels.push(panelNew);
    state.study.activePanelId = panelNew.id;
    renderAll();
  };
  page('estudar').querySelector('#study-topic').addEventListener('input', e => { panel.topic = e.target.value; save(); });
  page('estudar').querySelector('#study-search').onclick = ()=> fakeAI('resumo');
  page('estudar').querySelector('#study-summary').onclick = ()=> fakeAI('resumo');
  page('estudar').querySelector('#study-flash').onclick = ()=> fakeAI('flashcards');
  page('estudar').querySelector('#study-questions').onclick = ()=> fakeAI('questoes');
  page('estudar').querySelector('#study-optimized').onclick = ()=> fakeAI('otimizado');
  page('estudar').querySelector('#study-save').onclick = ()=> {
    panel.content = page('estudar').querySelector('#study-editor').innerHTML;
    save(); alert('Conteúdo salvo no navegador.');
  };
  page('estudar').querySelector('#fake-upload').onclick = ()=> page('estudar').querySelector('#real-upload').click();
  page('estudar').querySelector('#real-upload').onchange = (e)=>{
    [...e.target.files].forEach(f=> panel.uploads.push({id:id(), name:f.name,size:f.size}));
    renderAll();
  };
  page('estudar').querySelectorAll('[data-file]').forEach(chk => chk.onchange = ()=>{
    const fid = chk.dataset.file;
    if(chk.checked){
      if(!panel.selectedUploadIds.includes(fid)) panel.selectedUploadIds.push(fid);
    } else {
      panel.selectedUploadIds = panel.selectedUploadIds.filter(x => x !== fid);
    }
    save(); renderEstudar();
  });
  page('estudar').querySelectorAll('[data-cmd]').forEach(btn => btn.onclick = ()=> applyCmd(btn.dataset.cmd));
  page('estudar').querySelector('#tool-underline').onclick = ()=> wrapSelection('text-decoration:underline;text-decoration-color:#38bdf8;text-decoration-thickness:2px;');
  page('estudar').querySelectorAll('[data-color]').forEach(btn => btn.onclick = ()=> wrapSelection(`background:${btn.dataset.color};color:#111827;padding:1px 4px;border-radius:4px;`));
  page('estudar').querySelector('#prev-question').onclick = ()=> { panel.qIndex = Math.max(0, panel.qIndex-1); panel.showAnswer=false; renderEstudar(); save(); };
  page('estudar').querySelector('#next-question').onclick = ()=> { panel.qIndex = Math.min(panel.questions.length-1, panel.qIndex+1); panel.showAnswer=false; renderEstudar(); save(); };
  page('estudar').querySelector('#toggle-key').onclick = ()=> { panel.showKey = !panel.showKey; renderEstudar(); save(); };
  page('estudar').querySelector('#show-correct').onclick = ()=> { panel.showAnswer = true; renderEstudar(); save(); };
  page('estudar').querySelector('#manual-question').onclick = ()=> {
    const promptQ = window.prompt('Digite o enunciado da questão:');
    if(!promptQ) return;
    const style = window.prompt('Digite "ce" para certo/errado ou "mc" para múltipla escolha:', 'ce');
    if(style === 'mc'){
      const a = promptText('Alternativa A'); const b = promptText('Alternativa B'); const c = promptText('Alternativa C'); const d = promptText('Alternativa D');
      const answer = parseInt(window.prompt('Índice da correta: 0=A 1=B 2=C 3=D', '0') || '0', 10);
      panel.questions.push({id:id(), type:'mc', prompt:promptQ, options:[a,b,c,d], answer});
    } else {
      const answer = parseInt(window.prompt('0=Certo 1=Errado', '0') || '0', 10);
      panel.questions.push({id:id(), type:'ce', prompt:promptQ, options:['Certo','Errado'], answer});
    }
    panel.qIndex = panel.questions.length - 1;
    panel.showAnswer = false;
    renderAll();
  };
  page('estudar').querySelector('#add-ai-question').onclick = ()=> fakeAI('questoes');
  enableDrawing(page('estudar').querySelector('#draw-canvas'),
    page('estudar').querySelector('#brush-toggle'),
    page('estudar').querySelector('#eraser-toggle'),
    page('estudar').querySelector('#clear-canvas'));
}
function promptText(label){ return window.prompt(label+':') || '' }

function enableDrawing(canvas, brushBtn, eraserBtn, clearBtn){
  const ctx = canvas.getContext('2d');
  ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#f8fafc';
  let drawing = false; let mode = 'brush';
  const rect = ()=> canvas.getBoundingClientRect();
  const pos = e => {
    const r = rect();
    return { x: (e.clientX - r.left) * (canvas.width / r.width), y: (e.clientY - r.top) * (canvas.height / r.height) };
  };
  const start = e => { drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
  const move = e => {
    if(!drawing) return;
    const p = pos(e);
    ctx.globalCompositeOperation = mode === 'eraser' ? 'destination-out' : 'source-over';
    ctx.strokeStyle = mode === 'eraser' ? 'rgba(0,0,0,1)' : '#f8fafc';
    ctx.lineTo(p.x,p.y); ctx.stroke();
  };
  const end = ()=> { drawing = false; ctx.beginPath(); };
  canvas.onpointerdown = start; canvas.onpointermove = move; canvas.onpointerup = end; canvas.onpointerleave = end;
  brushBtn.onclick = ()=> { mode='brush'; };
  eraserBtn.onclick = ()=> { mode='eraser'; };
  clearBtn.onclick = ()=> ctx.clearRect(0,0,canvas.width,canvas.height);
}

function filteredCards(){
  const q = state.flashSearch.q.toLowerCase();
  return state.flashcards.filter(c => {
    const okQ = !q || c.front.toLowerCase().includes(q) || c.back.toLowerCase().includes(q) || c.tema.toLowerCase().includes(q);
    const okD = state.flashSearch.disciplina === 'Todas' || c.disciplina === state.flashSearch.disciplina;
    const okT = state.flashSearch.tema === 'Todos' || c.tema === state.flashSearch.tema;
    return okQ && okD && okT;
  });
}
function dueCards(){ return state.flashcards.filter(c => c.nextReview <= todayStr()); }
function renderFlashcards(){
  const due = dueCards();
  const active = due[state.flashReviewIndex] || state.flashcards[0];
  const disciplinas = ['Todas', ...new Set(state.flashcards.map(c=>c.disciplina))];
  const temas = ['Todos', ...new Set(state.flashcards.filter(c => state.flashSearch.disciplina==='Todas' || c.disciplina===state.flashSearch.disciplina).map(c=>c.tema))];
  page('flashcards').innerHTML = `
    <div class="hero">
      <div>
        <h1>Flashcards estilo Anki</h1>
        <p>Área dedicada à memorização com revisão espaçada e banco de cards pesquisável por disciplina e tema, agora posicionado abaixo.</p>
      </div>
    </div>

    <div class="card">
      <h2>Revisão do dia</h2>
      <div class="sub">Clique no cartão para virar.</div>
      ${active ? `
      <div class="flashcard ${state.flashFlipped?'flipped':''}" id="review-card">
        <div class="flashcard-inner">
          <div class="flash-front">${esc(active.front)}</div>
          <div class="flash-back">${esc(active.back)}</div>
        </div>
      </div>
      <div class="chips" style="margin-top:10px;"><span class="chip">${esc(active.disciplina)}</span><span class="chip">${esc(active.tema)}</span><span class="chip">Vencidos hoje: ${due.length}</span></div>
      <div class="actions-row" style="margin-top:14px;">
        <button class="btn" id="again-card">De novo</button>
        <button class="btn" id="hard-card">Difícil</button>
        <button class="btn primary" id="easy-card">Fácil</button>
      </div>` : `<div class="review-card">Nenhum flashcard disponível.</div>`}
    </div>

    <div class="card" style="margin-top:18px;">
      <h2>Banco de flashcards</h2>
      <div class="sub">Busca de cards por disciplina e tema.</div>
      <div class="search-row">
        <input id="flash-q" placeholder="Buscar por palavra-chave" value="${esc(state.flashSearch.q)}">
        <select id="flash-disc">${disciplinas.map(d=>`<option ${d===state.flashSearch.disciplina?'selected':''}>${esc(d)}</option>`).join('')}</select>
        <select id="flash-tema">${temas.map(t=>`<option ${t===state.flashSearch.tema?'selected':''}>${esc(t)}</option>`).join('')}</select>
      </div>
      <div id="flash-lib">
        ${filteredCards().map(c => `
          <div class="library-item">
            <strong>Disciplina:</strong> ${esc(c.disciplina)}<br>
            <strong>Tema:</strong> ${esc(c.tema)}<br>
            <strong>Frente:</strong> ${esc(c.front)}<br>
            <strong>Verso:</strong> ${esc(c.back)}
          </div>
        `).join('') || '<div class="library-item">Nenhum card encontrado.</div>'}
      </div>
      <div class="actions-row" style="margin-top:12px;">
        <button class="btn primary" id="new-ai-cards">Gerar flashcards com IA</button>
        <button class="btn" id="new-manual-card">Criar manualmente</button>
      </div>
    </div>
  `;
  if(active){
    page('flashcards').querySelector('#review-card').onclick = ()=> { state.flashFlipped = !state.flashFlipped; renderFlashcards(); save(); };
    page('flashcards').querySelector('#again-card').onclick = ()=> reviewFlashcard(active,'again');
    page('flashcards').querySelector('#hard-card').onclick = ()=> reviewFlashcard(active,'hard');
    page('flashcards').querySelector('#easy-card').onclick = ()=> reviewFlashcard(active,'easy');
  }
  page('flashcards').querySelector('#flash-q').oninput = e => { state.flashSearch.q=e.target.value; renderFlashcards(); save(); };
  page('flashcards').querySelector('#flash-disc').onchange = e => { state.flashSearch.disciplina=e.target.value; state.flashSearch.tema='Todos'; renderFlashcards(); save(); };
  page('flashcards').querySelector('#flash-tema').onchange = e => { state.flashSearch.tema=e.target.value; renderFlashcards(); save(); };
  page('flashcards').querySelector('#new-ai-cards').onclick = ()=> fakeAI('flashcards');
  page('flashcards').querySelector('#new-manual-card').onclick = ()=> {
    const disciplina = promptText('Disciplina');
    const tema = promptText('Tema');
    const front = promptText('Frente');
    const back = promptText('Verso');
    if(front && back) {
      state.flashcards.push({id:id(), disciplina, tema, front, back, level:'novo', nextReview:todayStr()});
      renderAll();
    }
  };
}
function reviewFlashcard(card, grade){
  const idx = state.flashcards.findIndex(c => c.id === card.id);
  if(idx < 0) return;
  let days = 1;
  if(grade === 'hard') days = 3;
  if(grade === 'easy') days = 7;
  const d = new Date(); d.setDate(d.getDate()+days);
  state.flashcards[idx].nextReview = d.toISOString().slice(0,10);
  state.flashcards[idx].level = grade;
  state.flashFlipped = false;
  state.flashReviewIndex = 0;
  renderAll();
}

function renderRevisoes(){
  const panelTopics = state.study.panels.map(p => p.topic).filter(Boolean);
  const studiedLessons = [...new Set([...panelTopics, ...state.flashcards.map(c=>c.tema)])];
  page('revisoes').innerHTML = `
    <div class="hero">
      <div><h1>Revisões</h1><p>Busca das aulas estudadas na área Estudar, revisão por banco de questões e filtros de quantidade, nível e estilo.</p></div>
    </div>
    <div class="grid two">
      <div class="card">
        <h2>Conteúdos estudados</h2>
        ${studiedLessons.map(t=>`<div class="review-card"><strong>Aula: ${esc(t)}</strong><p class="sub">Origem: Painel de Estudo/Flashcards</p></div>`).join('') || '<div class="review-card">Nenhum conteúdo estudado ainda.</div>'}
      </div>
      <div class="card">
        <h2>Painel de revisão por questões</h2>
        <select id="rev-amount"><option ${state.revisions.amount===10?'selected':''}>10</option><option ${state.revisions.amount===20?'selected':''}>20</option><option ${state.revisions.amount===30?'selected':''}>30</option></select>
        <select id="rev-level"><option ${state.revisions.level==='Fácil'?'selected':''}>Fácil</option><option ${state.revisions.level==='Médio'?'selected':''}>Médio</option><option ${state.revisions.level==='Difícil'?'selected':''}>Difícil</option></select>
        <select id="rev-style"><option ${state.revisions.style==='Múltipla escolha'?'selected':''}>Múltipla escolha</option><option ${state.revisions.style==='Certo ou errado'?'selected':''}>Certo ou errado</option></select>
        <div class="actions-row">
          <button class="btn primary" id="start-review">Iniciar revisão</button><button class="btn">Filtrar banco estudado</button>
        </div>
        <div class="question-item">
          <strong>Banco de questões estudadas</strong>
          <p class="sub">Total disponível no painel ativo: ${getActivePanel().questions.length}</p>
          <p class="sub">Configuração atual: ${state.revisions.amount} questões · ${state.revisions.level} · ${state.revisions.style}</p>
        </div>
      </div>
    </div>
  `;
  page('revisoes').querySelector('#rev-amount').onchange = e => { state.revisions.amount = parseInt(e.target.value,10); save(); renderRevisoes(); };
  page('revisoes').querySelector('#rev-level').onchange = e => { state.revisions.level = e.target.value; save(); };
  page('revisoes').querySelector('#rev-style').onchange = e => { state.revisions.style = e.target.value; save(); };
  page('revisoes').querySelector('#start-review').onclick = ()=> alert(`Revisão iniciada: ${state.revisions.amount} questões, nível ${state.revisions.level}, estilo ${state.revisions.style}.`);
}

function renderCiclo(){
  page('ciclo').innerHTML = `
    <div class="hero"><div><h1>Ciclo de estudo</h1><p>Painel em formato de anel para disciplinas e quantidades, além de tabela semanal com tempos e blocos de estudo.</p></div></div>
    <div class="card"><p class="sub">Mantido como na versão funcional anterior.</p></div>
  `;
}
function renderCronograma(){
  page('cronograma').innerHTML = `
    <div class="hero"><div><h1>Cronograma</h1><p>Calendário mensal para alocar disciplinas, metas do dia e marcar quando a meta foi batida.</p></div></div>
    <div class="card"><p class="sub">Mantido como na versão funcional anterior.</p></div>
  `;
}
function renderAll(){ renderEstudar(); renderFlashcards(); renderRevisoes(); renderCiclo(); renderCronograma(); save(); }
renderAll();
</script>
