<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ConcursoPrep</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{margin:0;font-family:Arial;background:#07122b;color:#fff;}
    .center{display:flex;align-items:center;justify-content:center;height:100vh;}
    .card{background:#1c2940;padding:30px;border-radius:12px;text-align:center;width:320px;}
    button{padding:10px;border:none;border-radius:8px;cursor:pointer;width:100%;margin-top:10px;}
    .dashboard{padding:20px;}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
    .box{background:#1c2940;padding:20px;border-radius:10px;margin-bottom:10px;}
  </style>
</head>
<body>

<div id="app"></div>

<script>
let sb;

async function init(){
  const res = await fetch('/api/supabase-config');
  const cfg = await res.json();
  sb = window.supabase.createClient(cfg.url, cfg.anonKey);

  sb.auth.onAuthStateChange((e,s)=>{
    if(s) loadApp(s);
    else showLogin();
  });

  const {data:{session}} = await sb.auth.getSession();
  if(session) loadApp(session);
  else showLogin();
}

function showLogin(){
  document.getElementById('app').innerHTML = `
    <div class="center">
      <div class="card">
        <h2>ConcursoPrep</h2>
        <p>Login com Google</p>
        <button onclick="login()">Entrar com Google</button>
      </div>
    </div>
  `;
}

async function login(){
  await sb.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:window.location.origin}
  });
}

async function loadApp(session){
  const user = session.user;

  // carregar dados do usuário
  let {data, error} = await sb
    .from('user_data')
    .select('*')
    .eq('id', user.id)
    .single();

  if(!data){
    await sb.from('user_data').insert({
      id:user.id,
      data:{temas:[],flashcards:[]}
    });
    data = {data:{temas:[],flashcards:[]}};
  }

  renderDashboard(user, data.data);
}

function renderDashboard(user, userData){
  document.getElementById('app').innerHTML = `
    <div class="dashboard">
      <div class="topbar">
        <div>
          <strong>${user.email}</strong>
        </div>
        <button onclick="logout()">Sair</button>
      </div>

      <div class="box">
        <h3>Temas</h3>
        <input id="temaInput" placeholder="Novo tema"/>
        <button onclick="addTema()">Adicionar</button>
        <ul id="listaTemas"></ul>
      </div>
    </div>
  `;

  window.userData = userData;
  renderTemas();
}

function renderTemas(){
  const ul = document.getElementById('listaTemas');
  ul.innerHTML = '';
  userData.temas.forEach(t=>{
    ul.innerHTML += `<li>${t}</li>`;
  });
}

async function addTema(){
  const input = document.getElementById('temaInput');
  const val = input.value.trim();
  if(!val) return;

  userData.temas.push(val);
  input.value='';
  renderTemas();

  const {data:{session}} = await sb.auth.getSession();

  await sb.from('user_data').update({
    data:userData
  }).eq('id', session.user.id);
}

async function logout(){
  await sb.auth.signOut();
  location.reload();
}

init();
</script>

</body>
</html>
