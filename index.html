<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConcursoPrep - Upload real de arquivos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box}
    :root{--bg:#081224;--bg2:#0d1730;--panel:#101c36;--panel2:#0b152b;--line:#213357;--text:#eef4ff;--muted:#99abd0;--blue:#3b82f6;--cyan:#14b8a6}
    html,body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
    .app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    .sidebar{background:var(--bg2);border-right:1px solid #1f2b44;padding:22px 16px;position:sticky;top:0;height:100vh;overflow:auto}
    .brand{font-size:24px;font-weight:700;margin-bottom:18px}.brand span{color:#60a5fa}
    .menu{display:flex;flex-direction:column;gap:8px}
    .menu button{width:100%;text-align:left;background:#101b31;color:#dbe7fb;border:1px solid var(--line);border-radius:14px;padding:12px 14px;cursor:pointer;font-size:14px}
    .menu button.active{background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;color:white;font-weight:700}
    .main{padding:24px}
    .hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px}
    h1,h2,h3{margin:0 0 8px}.hero h1{font-size:32px}
    .sub{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:12px}
    .top-actions,.toolbar,.tabs,.actions-row,.nav-row,.inline-row{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:none;border-radius:14px;padding:10px 14px;background:#18243e;color:white;cursor:pointer;border:1px solid var(--line);font-weight:700}
    .btn.primary{background:linear-gradient(135deg,var(--blue),var(--cyan));border:none}
    .btn.ghost{background:#0b1220}.btn.small{padding:8px 10px;font-size:13px}
    .btn.danger{background:#34131f;border-color:#6b2439}
    .grid{display:grid;gap:18px}.grid.two{grid-template-columns:1.15fr .85fr}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid #202c45;border-radius:24px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.22)}
    input,textarea{width:100%;background:#091120;border:1px solid var(--line);color:var(--text);border-radius:14px;padding:12px;margin-bottom:10px}
    .toolbar .tool{background:#0b1220;border:1px solid var(--line);color:#dbe7fb;border-radius:12px;padding:8px 12px;font-size:13px;cursor:pointer}
    .editor{min-height:260px;background:#091120;border:1px solid var(--line);border-radius:18px;padding:16px;line-height:1.8;outline:none}
    .tab{padding:8px 12px;border-radius:12px;border:1px solid var(--line);background:#0b1220;cursor:pointer;font-weight:700;color:#dbe7fb}
    .tab.active{background:linear-gradient(135deg,var(--blue),var(--cyan));border:none}
    .status{padding:10px 12px;border-radius:12px;background:#0b1220;border:1px solid var(--line);font-size:13px;color:var(--muted)}
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-card{max-width:460px;width:100%;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid #202c45;border-radius:24px;padding:24px;text-align:center}
    .badge{display:inline-block;padding:5px 8px;border-radius:999px;font-size:11px;background:#14203a;color:#9ec5ff;border:1px solid #27416a}
    .question-card,.file-item{background:#0b1220;border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:8px}
    .alternatives label{display:block;padding:10px 12px;border:1px solid var(--line);border-radius:12px;margin-top:8px;cursor:pointer}
    .alt-correct{border-color:#10b981 !important;background:rgba(16,185,129,.12)}
    .divider{height:1px;background:#24314d;margin:14px 0}
    .file-item{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .file-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
    .file-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .small{font-size:12px;color:var(--muted)}
    .hidden{display:none}
    a.link{color:#9ec5ff;text-decoration:none}
    @media (max-width:980px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.grid.two{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
let sb = null;
let sessionUser = null;
let panels = [];
let activePanelId = null;
let questions = [];
let files = [];
let activeQuestionIndex = 0;
let showGabarito = false;
let highlightCorrect = false;
let saveTimer = null;
let authListenerBound = false;
let booting = false;
const STORAGE_BUCKET = 'study-files';

function esc(s){ return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
function getActivePanel(){ return panels.find(p => p.id === activePanelId) || null; }
function setStatus(msg){ const el = document.getElementById('saveStatus'); if(el) el.textContent = msg; }

function renderLoading(msg){
  document.getElementById('root').innerHTML = '<div class="login-wrap"><div class="login-card"><div class="brand">Concurso<span>Prep</span></div><h2>Carregando</h2><p class="sub">'+esc(msg || 'Inicializando...')+'</p></div></div>';
}

async function safeInitSupabase(){
  const res = await fetch('/api/supabase-config', { cache:'no-store' });
  if(!res.ok) throw new Error('Falha ao carregar /api/supabase-config');
  const cfg = await res.json();
  if(!cfg.url || !cfg.anonKey) throw new Error('SUPABASE_URL ou SUPABASE_ANON_KEY ausentes');
  if(!window.__concursoprepSupabaseClient){
    window.__concursoprepSupabaseClient = window.supabase.createClient(cfg.url, cfg.anonKey, {
      auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
    });
  }
  sb = window.__concursoprepSupabaseClient;
}

async function initApp(){
  if(booting) return;
  booting = true;
  renderLoading('Conectando ao Supabase...');
  try{
    await safeInitSupabase();
    if(!authListenerBound){
      sb.auth.onAuthStateChange(async (_event, session) => {
        if(session && session.user){ sessionUser = session.user; await afterLoginLoad(); }
        else { sessionUser = null; renderLogin(); }
      });
      authListenerBound = true;
    }
    const sessionResponse = await sb.auth.getSession();
    const session = sessionResponse && sessionResponse.data ? sessionResponse.data.session : null;
    if(session && session.user){ sessionUser = session.user; await afterLoginLoad(); }
    else renderLogin();
  }catch(err){
    document.getElementById('root').innerHTML = '<div class="login-wrap"><div class="login-card"><h2>Erro ao iniciar</h2><p class="sub">'+esc(err.message)+'</p><div class="actions-row" style="justify-content:center"><button class="btn primary" id="retryBoot">Tentar novamente</button></div></div></div>';
    const btn = document.getElementById('retryBoot');
    if(btn) btn.onclick = () => { booting = false; initApp(); };
  }finally{ booting = false; }
}

async function afterLoginLoad(){
  renderLoading('Carregando seus dados...');
  await loadPanels();
  await loadQuestions();
  await loadFiles();
  renderApp();
}

function renderLogin(){
  document.getElementById('root').innerHTML = '<div class="login-wrap"><div class="login-card"><div class="brand">Concurso<span>Prep</span></div><h2>Painel de Estudo</h2><p class="sub">Entre com Google para carregar suas abas, questões e arquivos.</p><div class="actions-row" style="justify-content:center"><button class="btn primary" id="loginBtn">Entrar com Google</button><button class="btn" id="refreshBtn">Recarregar sessão</button></div></div></div>';
  document.getElementById('loginBtn').onclick = loginGoogle;
  document.getElementById('refreshBtn').onclick = async () => { try { await sb.auth.signOut({ scope:'local' }); } catch(e) {} location.reload(); };
}

async function loginGoogle(){
  const response = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.origin } });
  if(response && response.error) alert(response.error.message);
}
async function logout(){ try { await sb.auth.signOut(); } catch(e) {} sessionUser = null; location.reload(); }

async function loadPanels(){
  const response = await sb.from('study_panels').select('*').eq('user_id', sessionUser.id).order('created_at', { ascending:true });
  if(response.error){ alert('Erro ao carregar painéis: ' + response.error.message); panels=[]; activePanelId=null; return; }
  panels = response.data || [];
  if(panels.length === 0){
    const created = await createPanelInDb('Direito Constitucional', 'Controle de constitucionalidade', '<p>Comece a estudar por aqui.</p>');
    if(created) panels = [created];
  }
  activePanelId = panels.length ? panels[0].id : null;
}

async function createPanelInDb(title, topic, content_html){
  const response = await sb.from('study_panels').insert({
    user_id: sessionUser.id, title:title, topic:topic || '', content_html:content_html || ''
  }).select().single();
  if(response.error){ alert('Erro ao criar painel: ' + response.error.message); return null; }
  return response.data;
}

async function updatePanelInDb(panel){
  const response = await sb.from('study_panels').update({
    title: panel.title, topic: panel.topic, content_html: panel.content_html, updated_at: new Date().toISOString()
  }).eq('id', panel.id).eq('user_id', sessionUser.id);
  return !response.error;
}

function scheduleSave(panel){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const ok = await updatePanelInDb(panel);
    setStatus(ok ? 'Painel salvo no Supabase.' : 'Erro ao salvar painel.');
  }, 700);
}

async function loadQuestions(){
  const panel = getActivePanel();
  questions = []; activeQuestionIndex = 0; showGabarito = false; highlightCorrect = false;
  if(!panel) return;
  const response = await sb.from('study_questions').select('*').eq('user_id', sessionUser.id).eq('study_panel_id', panel.id).order('created_at', { ascending:true });
  if(response.error){ alert('Erro ao carregar questões: ' + response.error.message); return; }
  questions = response.data || [];
}

async function loadFiles(){
  const panel = getActivePanel();
  files = [];
  if(!panel) return;
  const response = await sb.from('study_files').select('*').eq('user_id', sessionUser.id).eq('study_panel_id', panel.id).order('created_at', { ascending:true });
  if(response.error){ alert('Erro ao carregar arquivos: ' + response.error.message); return; }
  files = response.data || [];
}

function openFilePicker(){
  const input = document.getElementById('realFileInput');
  if(input) input.click();
}

async function uploadRealFile(evt){
  const panel = getActivePanel();
  if(!panel){ alert('Selecione uma aba antes de enviar arquivo.'); evt.target.value = ''; return; }
  const file = evt.target.files && evt.target.files[0];
  if(!file) return;
  setStatus('Enviando arquivo...');
  try{
    const sanitized = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = sessionUser.id + '/' + panel.id + '/' + Date.now() + '_' + sanitized;

    const uploadRes = await sb.storage.from(STORAGE_BUCKET).upload(path, file, { upsert:false });
    if(uploadRes.error) throw uploadRes.error;

    const publicRes = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
    const publicUrl = publicRes && publicRes.data ? publicRes.data.publicUrl : '';

    const insertRes = await sb.from('study_files').insert({
      user_id: sessionUser.id,
      study_panel_id: panel.id,
      file_name: file.name,
      file_type: file.type || (file.name.includes('.') ? file.name.split('.').pop() : ''),
      file_url: publicUrl,
      is_selected_for_ai: false
    });
    if(insertRes.error) throw insertRes.error;

    await loadFiles();
    renderApp();
    setStatus('Arquivo enviado com sucesso.');
  }catch(err){
    console.error(err);
    alert('Erro ao enviar arquivo. Verifique se o bucket "study-files" existe no Supabase Storage e está acessível. Erro: ' + (err.message || 'desconhecido'));
    setStatus('Erro ao enviar arquivo.');
  }finally{
    evt.target.value = '';
  }
}

async function toggleFile(id, checked){
  const response = await sb.from('study_files').update({ is_selected_for_ai: checked }).eq('id', id).eq('user_id', sessionUser.id);
  if(response.error){ console.error(response.error); alert('Erro ao atualizar seleção do arquivo.'); return; }
  await loadFiles();
  renderFilesOnly();
}

async function deleteFile(id){
  const file = files.find(f => f.id === id);
  if(!file) return;
  const ok = confirm('Excluir este arquivo?');
  if(!ok) return;
  setStatus('Excluindo arquivo...');
  try{
    if(file.file_url){
      const marker = '/' + STORAGE_BUCKET + '/';
      const idx = file.file_url.indexOf(marker);
      if(idx >= 0){
        const path = file.file_url.slice(idx + marker.length);
        const removeRes = await sb.storage.from(STORAGE_BUCKET).remove([path]);
        if(removeRes.error) console.warn(removeRes.error);
      }
    }
    const dbRes = await sb.from('study_files').delete().eq('id', id).eq('user_id', sessionUser.id);
    if(dbRes.error) throw dbRes.error;
    await loadFiles();
    renderApp();
    setStatus('Arquivo excluído.');
  }catch(err){
    console.error(err);
    alert('Erro ao excluir arquivo: ' + (err.message || 'desconhecido'));
    setStatus('Erro ao excluir arquivo.');
  }
}

function renderFilesOnly(){
  const container = document.getElementById('filesList');
  const summaryBox = document.getElementById('summaryCounts');
  if(!container) return;
  if(!files.length){
    container.innerHTML = '<div class="file-item">Nenhum arquivo nessa aba.</div>';
  } else {
    container.innerHTML = files.map(file => '<div class="file-item"><div class="file-left"><input type="checkbox" data-file="'+file.id+'" '+(file.is_selected_for_ai ? 'checked' : '')+'><div class="file-name">📄 '+esc(file.file_name)+'</div></div><div class="actions-row"><a class="link small" href="'+esc(file.file_url || '#')+'" target="_blank" rel="noopener">'+(file.file_url ? 'abrir' : 'sem link')+'</a><button class="btn small danger" data-del="'+file.id+'">Excluir</button></div></div>').join('');
  }
  if(summaryBox){
    const selectedCount = files.filter(f => f.is_selected_for_ai).length;
    summaryBox.textContent = questions.length + ' questão(ões) · ' + files.length + ' arquivo(s) · ' + selectedCount + ' selecionado(s)';
  }
  document.querySelectorAll('[data-file]').forEach(chk => { chk.onchange = () => toggleFile(chk.dataset.file, chk.checked); });
  document.querySelectorAll('[data-del]').forEach(btn => { btn.onclick = () => deleteFile(btn.dataset.del); });
}

async function createQuestionManual(){
  const panel = getActivePanel(); if(!panel) return;
  const question_type = (prompt('Digite "ce" para certo/errado ou "mc" para múltipla escolha:', 'ce') || 'ce').trim().toLowerCase();
  const promptText = window.prompt('Digite o enunciado da questão:'); if(!promptText) return;
  let options = [], correct_answer = '';
  if(question_type === 'mc'){
    const a = window.prompt('Alternativa A:') || '';
    const b = window.prompt('Alternativa B:') || '';
    const c = window.prompt('Alternativa C:') || '';
    const d = window.prompt('Alternativa D:') || '';
    options = [a,b,c,d];
    correct_answer = window.prompt('Digite a correta: A, B, C ou D', 'A') || 'A';
  } else {
    options = ['Certo','Errado'];
    correct_answer = window.prompt('Digite a correta: Certo ou Errado', 'Certo') || 'Certo';
  }
  const response = await sb.from('study_questions').insert({
    user_id: sessionUser.id, study_panel_id: panel.id, question_type: question_type === 'mc' ? 'mc' : 'ce',
    prompt: promptText, options_json: options, correct_answer: correct_answer, created_by: 'manual', difficulty: 'medio'
  });
  if(response.error){ alert('Erro ao criar questão: ' + response.error.message); return; }
  await loadQuestions(); activeQuestionIndex = questions.length ? questions.length - 1 : 0; renderApp();
}

async function generateQuestionAI(){
  const panel = getActivePanel(); if(!panel) return;
  const topic = panel.topic || 'tema informado';
  const response = await sb.from('study_questions').insert({
    user_id: sessionUser.id, study_panel_id: panel.id, question_type: 'mc',
    prompt: 'Questão gerada sobre ' + topic, options_json: ['Alternativa A','Alternativa correta','Alternativa C','Alternativa D'],
    correct_answer: 'B', created_by: 'ai', difficulty: 'medio'
  });
  if(response.error){ alert('Erro ao gerar questão: ' + response.error.message); return; }
  await loadQuestions(); activeQuestionIndex = questions.length ? questions.length - 1 : 0; renderApp();
}

function currentQuestion(){ return questions[activeQuestionIndex] || null; }
function correctIndex(q){
  if(!q) return -1;
  if(q.question_type === 'ce') return String(q.correct_answer).toLowerCase().includes('certo') ? 0 : 1;
  const map = {A:0,B:1,C:2,D:3}; return map[String(q.correct_answer).toUpperCase()] ?? -1;
}

function renderApp(){
  const active = getActivePanel();
  const q = currentQuestion();
  const selectedCount = files.filter(f => f.is_selected_for_ai).length;
  document.getElementById('root').innerHTML = `
    <div class="app">
      <aside class="sidebar">
        <div class="brand">Concurso<span>Prep</span></div>
        <div class="menu"><button class="active">Painel de Estudo</button></div>
        <div style="margin-top:16px;"><div class="badge">${esc(sessionUser ? sessionUser.email : '')}</div></div>
        <div class="top-actions" style="margin-top:16px;">
          <button class="btn ghost" id="newPanelSidebar">+ Nova aba</button>
          <button class="btn" id="logoutBtn">Sair</button>
        </div>
      </aside>
      <main class="main">
        <div class="hero">
          <div><h1>Painel de Estudo</h1><p class="sub">Agora o botão busca arquivo no computador, envia para o Supabase Storage, só entra como base quando marcado e permite excluir.</p></div>
          <div class="top-actions"><button class="btn primary" id="newPanelTop">Nova aba</button><button class="btn" id="saveNow">Salvar agora</button></div>
        </div>
        <div class="tabs">
          ${panels.map(p => '<button class="tab ' + (p.id===activePanelId?'active':'') + '" data-panel="' + p.id + '">' + esc(p.title) + '</button>').join('')}
        </div>
        <div class="grid two">
          <div class="card">
            <h2>Dados da aba</h2>
            <div class="sub">Edite o nome da aba, o assunto e o conteúdo.</div>
            ${active ? `
              <input id="panelTitle" value="${esc(active.title)}" placeholder="Nome da aba/disciplina">
              <textarea id="panelTopic" rows="3" placeholder="Tema principal">${esc(active.topic)}</textarea>
              <div class="toolbar">
                <button class="tool" data-cmd="bold"><strong>B</strong></button>
                <button class="tool" data-cmd="italic"><em>I</em></button>
                <button class="tool" id="underlineBtn">Sublinhar</button>
                <button class="tool" id="yellowBtn" style="background:#fde68a;color:#111827;">Amarelo</button>
                <button class="tool" id="greenBtn" style="background:#bbf7d0;color:#111827;">Verde</button>
                <button class="tool" id="pinkBtn" style="background:#fbcfe8;color:#111827;">Rosa</button>
                <button class="tool" id="blueBtn" style="background:#bae6fd;color:#111827;">Azul</button>
              </div>
              <div id="panelEditor" class="editor" contenteditable="true">${active.content_html || ''}</div>
            ` : `<div class="status">Nenhuma aba selecionada.</div>`}
          </div>
          <div class="card">
            <h2>Status</h2>
            <div class="status" id="saveStatus">Pronto.</div>
            <div style="margin-top:16px;">
              <h3>Resumo da aba</h3>
              <div class="status" id="summaryCounts">${questions.length} questão(ões) · ${files.length} arquivo(s) · ${selectedCount} selecionado(s)</div>
            </div>
            <div class="divider"></div>
            <h3>Base de arquivos para IA</h3>
            <div class="sub">Somente os arquivos marcados entram como base da IA.</div>
            <input type="file" id="realFileInput" class="hidden">
            <div class="actions-row"><button class="btn small primary" id="addFileBtn">Buscar arquivo no computador</button></div>
            <div id="filesList">
              ${files.length ? files.map(file => '<div class="file-item"><div class="file-left"><input type="checkbox" data-file="'+file.id+'" '+(file.is_selected_for_ai ? 'checked' : '')+'><div class="file-name">📄 '+esc(file.file_name)+'</div></div><div class="actions-row"><a class="link small" href="'+esc(file.file_url || '#')+'" target="_blank" rel="noopener">'+(file.file_url ? 'abrir' : 'sem link')+'</a><button class="btn small danger" data-del="'+file.id+'">Excluir</button></div></div>').join('') : '<div class="file-item">Nenhum arquivo nessa aba.</div>'}
            </div>
            <div class="small" style="margin-top:10px">Necessário ter um bucket chamado <strong>study-files</strong> no Supabase Storage.</div>
          </div>
        </div>
        <div class="card" style="margin-top:18px;">
          <div class="hero" style="margin-bottom:12px;">
            <div><h2>Painel de Questões</h2><p class="sub">Crie questões manuais e gere questões por IA.</p></div>
            <div class="top-actions"><button class="btn" id="newQuestionBtn">Nova questão</button><button class="btn primary" id="genQuestionBtn">Gerar com IA</button></div>
          </div>
          ${q ? `
            <div class="question-card">
              <strong>Questão ${activeQuestionIndex + 1} de ${questions.length}</strong>
              <p style="margin-top:10px;">${esc(q.prompt)}</p>
              <div class="alternatives">
                ${(q.options_json || []).map((opt, i) => '<label class="'+(highlightCorrect && i === correctIndex(q) ? 'alt-correct' : '')+'"><input type="radio" name="qactive"> '+String.fromCharCode(65+i)+') '+esc(opt)+'</label>').join('')}
              </div>
              ${showGabarito ? `<p class="small" style="margin-top:12px;">Gabarito: ${esc(q.correct_answer)}</p>` : ''}
            </div>
            <div class="inline-row" style="margin-top:12px;justify-content:space-between;align-items:center;">
              <div class="nav-row"><button class="btn small" id="prevQuestion">← Voltar</button><button class="btn small primary" id="nextQuestion">Próxima →</button></div>
              <div class="actions-row"><button class="btn small" id="toggleGabarito">${showGabarito ? 'Ocultar gabarito' : 'Mostrar gabarito'}</button><button class="btn small" id="showCorrect">Resposta correta</button></div>
            </div>
          ` : `<div class="question-card">Nenhuma questão cadastrada nessa aba ainda.</div>`}
        </div>
      </main>
    </div>`;

  document.getElementById('logoutBtn').onclick = logout;
  document.getElementById('newPanelSidebar').onclick = createNewPanel;
  document.getElementById('newPanelTop').onclick = createNewPanel;
  document.getElementById('saveNow').onclick = saveCurrentPanel;
  document.getElementById('addFileBtn').onclick = openFilePicker;
  document.getElementById('realFileInput').onchange = uploadRealFile;

  document.querySelectorAll('[data-panel]').forEach(btn => { btn.onclick = async () => { activePanelId = btn.dataset.panel; await loadQuestions(); await loadFiles(); renderApp(); }; });

  if(active){
    document.getElementById('panelTitle').addEventListener('input', e => { active.title = e.target.value; scheduleSave(active); });
    document.getElementById('panelTopic').addEventListener('input', e => { active.topic = e.target.value; scheduleSave(active); });
    const editor = document.getElementById('panelEditor');
    editor.addEventListener('input', () => { active.content_html = editor.innerHTML; scheduleSave(active); });
    document.querySelectorAll('[data-cmd]').forEach(btn => { btn.onclick = () => document.execCommand(btn.dataset.cmd, false, null); });
    document.getElementById('underlineBtn').onclick = () => wrapSelection('text-decoration:underline;text-decoration-color:#38bdf8;text-decoration-thickness:2px;');
    document.getElementById('yellowBtn').onclick = () => wrapSelection('background:#fde68a;color:#111827;padding:1px 4px;border-radius:4px;');
    document.getElementById('greenBtn').onclick = () => wrapSelection('background:#bbf7d0;color:#111827;padding:1px 4px;border-radius:4px;');
    document.getElementById('pinkBtn').onclick = () => wrapSelection('background:#fbcfe8;color:#111827;padding:1px 4px;border-radius:4px;');
    document.getElementById('blueBtn').onclick = () => wrapSelection('background:#bae6fd;color:#111827;padding:1px 4px;border-radius:4px;');
  }

  document.querySelectorAll('[data-file]').forEach(chk => { chk.onchange = () => toggleFile(chk.dataset.file, chk.checked); });
  document.querySelectorAll('[data-del]').forEach(btn => { btn.onclick = () => deleteFile(btn.dataset.del); });

  const newQuestionBtn = document.getElementById('newQuestionBtn'); if(newQuestionBtn) newQuestionBtn.onclick = createQuestionManual;
  const genQuestionBtn = document.getElementById('genQuestionBtn'); if(genQuestionBtn) genQuestionBtn.onclick = generateQuestionAI;
  const prevQuestion = document.getElementById('prevQuestion'); if(prevQuestion) prevQuestion.onclick = () => { activeQuestionIndex = Math.max(0, activeQuestionIndex - 1); showGabarito = false; highlightCorrect = false; renderApp(); };
  const nextQuestion = document.getElementById('nextQuestion'); if(nextQuestion) nextQuestion.onclick = () => { activeQuestionIndex = Math.min(questions.length - 1, activeQuestionIndex + 1); showGabarito = false; highlightCorrect = false; renderApp(); };
  const toggleGabarito = document.getElementById('toggleGabarito'); if(toggleGabarito) toggleGabarito.onclick = () => { showGabarito = !showGabarito; renderApp(); };
  const showCorrect = document.getElementById('showCorrect'); if(showCorrect) showCorrect.onclick = () => { highlightCorrect = true; renderApp(); };
}

async function createNewPanel(){
  const title = prompt('Nome da nova aba/disciplina:', 'Nova disciplina');
  if(!title) return;
  const topic = prompt('Tema inicial da aba:', '') || '';
  const created = await createPanelInDb(title, topic, '<p>Comece a estudar por aqui.</p>');
  if(created){
    panels.push(created);
    activePanelId = created.id;
    await loadQuestions();
    await loadFiles();
    renderApp();
  }
}

async function saveCurrentPanel(){
  const active = getActivePanel(); if(!active) return;
  setStatus('Salvando...');
  const ok = await updatePanelInDb(active);
  setStatus(ok ? 'Painel salvo no Supabase.' : 'Erro ao salvar painel.');
}

function wrapSelection(styleText){
  const sel = window.getSelection(); if(!sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0); const span = document.createElement('span'); span.style.cssText = styleText;
  try{ range.surroundContents(span); } catch{ document.execCommand('insertHTML', false, '<span style="'+styleText+'">'+sel.toString()+'</span>'); }
}

initApp();
</script>
