<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConcursoPrep</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#07122b;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }
    .card{
      background:#1c2940;
      padding:32px;
      border-radius:16px;
      width:320px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    h1{
      margin:0 0 12px;
      font-size:24px;
    }
    p{
      margin:0 0 20px;
      color:#d7dbe6;
    }
    button{
      border:0;
      border-radius:10px;
      padding:12px 18px;
      cursor:pointer;
      font-size:16px;
      width:100%;
    }
    .error{
      margin-top:14px;
      color:#ffb4b4;
      font-size:14px;
      white-space:pre-wrap;
    }
    .ok{
      margin-top:14px;
      color:#9ff0b7;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="card" id="app">
    <h1>ConcursoPrep</h1>
    <p>Login com Google</p>
    <button id="btnLogin">Entrar com Google</button>
    <div id="status"></div>
  </div>

  <script>
    let sbClient = null;

    function setStatus(message, type){
      const el = document.getElementById('status');
      if(!el) return;
      el.className = type === 'error' ? 'error' : 'ok';
      el.textContent = message || '';
    }

    function renderLoggedIn(session){
      document.body.innerHTML = `
        <div style="color:white;text-align:center;">
          <div style="background:#1c2940;padding:32px;border-radius:16px;min-width:320px;box-shadow:0 10px 30px rgba(0,0,0,.25);">
            <h2 style="margin-top:0;">Logado com sucesso 🎉</h2>
            <p style="color:#d7dbe6;">${session.user.email}</p>
            <button id="btnLogout" style="border:0;border-radius:10px;padding:12px 18px;cursor:pointer;font-size:16px;">Sair</button>
          </div>
        </div>
      `;

      const btnLogout = document.getElementById('btnLogout');
      if(btnLogout){
        btnLogout.addEventListener('click', async () => {
          try{
            await sbClient.auth.signOut();
            window.location.reload();
          }catch(err){
            console.error('Erro ao sair:', err);
          }
        });
      }
    }

    async function initSupabase(){
      try{
        const res = await fetch('/api/supabase-config', { cache: 'no-store' });
        if(!res.ok){
          throw new Error('Falha ao carregar /api/supabase-config');
        }

        const cfg = await res.json();
        if(!cfg.url || !cfg.anonKey){
          throw new Error('SUPABASE_URL ou SUPABASE_ANON_KEY ausentes');
        }

        sbClient = window.supabase.createClient(cfg.url, cfg.anonKey);

        sbClient.auth.onAuthStateChange((event, session) => {
          console.log('Auth mudou:', event, session);
          if(session){
            renderLoggedIn(session);
          }
        });

        const sessionResponse = await sbClient.auth.getSession();
        const session = sessionResponse?.data?.session;

        if(session){
          renderLoggedIn(session);
        } else {
          setStatus('Supabase carregado com sucesso.', 'ok');
        }
      }catch(err){
        console.error('Erro ao iniciar Supabase:', err);
        setStatus('Erro ao iniciar Supabase: ' + err.message, 'error');
      }
    }

    async function loginGoogle(){
      try{
        if(!sbClient){
          throw new Error('Supabase ainda não foi carregado');
        }

        const response = await sbClient.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin
          }
        });

        if(response && response.error){
          throw response.error;
        }
      }catch(err){
        console.error('Erro no login:', err);
        setStatus('Erro no login: ' + err.message, 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const btnLogin = document.getElementById('btnLogin');
      if(btnLogin){
        btnLogin.addEventListener('click', loginGoogle);
      }
      initSupabase();
    });
  </script>
</body>
</html>
