<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConcursoPrep Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#071120;color:#eef4ff}
    .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{background:#0b1730;padding:18px;border-right:1px solid #203252}
    .main{padding:22px}.card{background:#0f1b34;border:1px solid #22365a;border-radius:18px;padding:16px}.grid{display:grid;grid-template-columns:1.7fr .8fr;gap:16px}
    .btn{padding:10px 14px;border-radius:12px;border:1px solid #2b436d;background:#172847;color:#fff;cursor:pointer}.primary{background:linear-gradient(135deg,#3b82f6,#14b8a6);border:none}
    .tab{padding:8px 12px;border-radius:10px;border:1px solid #2b436d;background:#0c1528;color:#fff;cursor:pointer}.active{background:linear-gradient(135deg,#3b82f6,#14b8a6);border:none}
    input,textarea{width:100%;background:#091120;color:#eef4ff;border:1px solid #233759;border-radius:12px;padding:12px;margin-bottom:10px}
    #editor{min-height:360px;background:#091120;border:1px solid #233759;border-radius:16px;padding:14px}
    .row{display:flex;gap:8px;flex-wrap:wrap}.small{font-size:12px;color:#99abd0}.item{background:#091120;border:1px solid #233759;border-radius:12px;padding:10px;margin-top:8px}
    .login{display:flex;align-items:center;justify-content:center;min-height:100vh}.login .card{max-width:460px;width:100%;text-align:center}
    @media(max-width:1000px){.app{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
let sb=null, user=null, panels=[], activePanelId=null, files=[], questions=[], flashcards=[], questionIndex=0;
const STORAGE_BUCKET='study-files';

function e(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function activePanel(){return panels.find(p=>String(p.id)===String(activePanelId))}
function status(msg){const el=document.getElementById('status'); if(el) el.innerHTML=msg;}

async function init(){
  const cfgRes = await fetch('/api/supabase-config',{cache:'no-store'});
  const cfg = await cfgRes.json();
  if(!window.__cpClient){
    window.__cpClient = window.supabase.createClient(cfg.url,cfg.anonKey,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
  }
  sb = window.__cpClient;

  if(!window.__cpAuthBound){
    sb.auth.onAuthStateChange(async (_ev, session)=>{
      if(session?.user){ user=session.user; await loadAll(); renderApp(); }
      else { user=null; renderLogin(); }
    });
    window.__cpAuthBound = true;
  }

  const {data} = await sb.auth.getSession();
  if(data?.session?.user){ user=data.session.user; await loadAll(); renderApp(); }
  else renderLogin();
}

function renderLogin(){
  document.getElementById('root').innerHTML = '<div class="login"><div class="card"><h1>ConcursoPrep</h1><p class="small">Login persistente corrigido + IA com resumo, questões e flashcards.</p><button class="btn primary" id="loginBtn">Entrar com Google</button></div></div>';
  document.getElementById('loginBtn').onclick = async ()=> {
    const {error} = await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin}});
    if(error) alert(error.message);
  };
}

async function logout(){ await sb.auth.signOut(); renderLogin(); }

async function ensurePanel(){
  const res = await sb.from('study_panels').select('*').eq('user_id',user.id).order('created_at',{ascending:true});
  panels = res.data || [];
  if(!panels.length){
    const created = await sb.from('study_panels').insert({user_id:user.id,title:'Painel principal',topic:'Tema inicial',content_html:'<p>Comece a estudar por aqui.</p>'}).select().single();
    if(created.data) panels=[created.data];
  }
  activePanelId = panels[0]?.id || null;
}

async function loadFiles(){
  if(!activePanelId){ files=[]; return; }
  const res = await sb.from('study_files').select('*').eq('user_id',user.id).eq('study_panel_id',activePanelId).order('created_at',{ascending:true});
  files = res.data || [];
}
async function loadQuestions(){
  if(!activePanelId){ questions=[]; return; }
  const res = await sb.from('study_questions').select('*').eq('user_id',user.id).eq('study_panel_id',activePanelId).order('created_at',{ascending:true});
  questions = res.data || [];
  questionIndex = 0;
}
async function loadFlashcards(){
  if(!activePanelId){ flashcards=[]; return; }
  const res = await sb.from('study_flashcards').select('*').eq('user_id',user.id).eq('study_panel_id',activePanelId).order('created_at',{ascending:true});
  flashcards = res.data || [];
}
async function loadAll(){ await ensurePanel(); await loadFiles(); await loadQuestions(); await loadFlashcards(); }

async function savePanel(){
  const p = activePanel();
  if(!p) return;
  p.title = document.getElementById('panelTitle').value;
  p.topic = document.getElementById('panelTopic').value;
  p.content_html = document.getElementById('editor').innerHTML;
  const res = await sb.from('study_panels').update({title:p.title,topic:p.topic,content_html:p.content_html,updated_at:new Date().toISOString()}).eq('id',p.id).eq('user_id',user.id);
  if(res.error) alert(res.error.message); else status('Painel salvo.');
}

function renderApp(){
  const p = activePanel();
  const q = questions[questionIndex];
  document.getElementById('root').innerHTML = `
    <div class="app">
      <div class="side">
        <h2>ConcursoPrep</h2>
        <div class="small">${e(user?.email||'')}</div>
        <div class="row" style="margin-top:12px"><button class="btn" id="logoutBtn">Sair</button></div>
      </div>
      <div class="main">
        <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px">
          <div><h1 style="margin:0 0 6px">Painel de Estudo</h1><div class="small">Área central ampliada + login persistente + IA automática</div></div>
          <div class="row"><button class="btn" id="saveBtn">Salvar agora</button></div>
        </div>
        <div class="grid">
          <div>
            <div class="card">
              <h2>Painel central</h2>
              <input id="panelTitle" value="${e(p?.title||'')}">
              <textarea id="panelTopic" rows="3">${e(p?.topic||'')}</textarea>
              <div class="row" style="margin-bottom:10px">
                <button class="btn primary" id="summaryBtn">Gerar resumo</button>
                <button class="btn" id="questionsBtn">Gerar 10 questões</button>
                <button class="btn" id="flashcardsBtn">Gerar 20 flashcards</button>
                <button class="btn" id="allBtn">Estudo otimizado</button>
              </div>
              <div id="editor" contenteditable="true">${p?.content_html||''}</div>
            </div>

            <div class="card" style="margin-top:16px">
              <h2>Questões</h2>
              ${q ? `
                <div class="item">
                  <strong>Questão ${questionIndex+1} de ${questions.length}</strong>
                  <p>${e(q.prompt)}</p>
                  ${(q.options_json||[]).map((opt,i)=>`<div class="item">${String.fromCharCode(65+i)}) ${e(opt)}</div>`).join('')}
                  <div class="small" style="margin-top:8px">Gabarito: ${e(q.correct_answer||'')}</div>
                </div>
                <div class="row" style="margin-top:10px">
                  <button class="btn" id="prevQ">Voltar</button>
                  <button class="btn" id="nextQ">Próxima</button>
                </div>
              ` : '<div class="small">Nenhuma questão ainda.</div>'}
            </div>

            <div class="card" style="margin-top:16px">
              <h2>Flashcards</h2>
              <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px">
                ${flashcards.length ? flashcards.map(f=>`<div class="item"><strong>${e(f.front)}</strong><hr style="border-color:#233759"><div>${e(f.back)}</div></div>`).join('') : '<div class="small">Nenhum flashcard ainda.</div>'}
              </div>
            </div>
          </div>

          <div>
            <div class="card">
              <h2>Status</h2>
              <div class="item" id="status">Pronto.</div>
              <h3 style="margin-top:14px">Arquivos base da IA</h3>
              <div class="small">Somente arquivos marcados entram na IA.</div>
              <input type="file" id="fileInput" style="display:none">
              <div class="row" style="margin-top:10px"><button class="btn primary" id="uploadBtn">Buscar arquivo</button></div>
              <div id="filesBox">
                ${files.length ? files.map(f=>`
                  <div class="item">
                    <div class="row" style="justify-content:space-between;align-items:center">
                      <div style="flex:1;min-width:0">
                        <label><input type="checkbox" data-file="${f.id}" ${f.is_selected_for_ai?'checked':''}> ${e(f.file_name)}</label>
                      </div>
                      <div class="row">
                        <a class="link small" href="${e(f.file_url||'#')}" target="_blank">abrir</a>
                        <button class="btn danger" data-del="${f.id}">Excluir</button>
                      </div>
                    </div>
                  </div>`).join('') : '<div class="small" style="margin-top:10px">Nenhum arquivo enviado.</div>'}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('logoutBtn').onclick = logout;
  document.getElementById('saveBtn').onclick = savePanel;
  document.getElementById('uploadBtn').onclick = ()=>document.getElementById('fileInput').click();
  document.getElementById('fileInput').onchange = uploadFile;
  document.getElementById('summaryBtn').onclick = generateSummary;
  document.getElementById('questionsBtn').onclick = generateQuestionsWithAI;
  document.getElementById('flashcardsBtn').onclick = generateFlashcardsWithAI;
  document.getElementById('allBtn').onclick = async ()=>{await generateSummary(); await generateQuestionsWithAI(); await generateFlashcardsWithAI();};
  document.querySelectorAll('[data-file]').forEach(el=>el.onchange=()=>toggleFile(el.dataset.file, el.checked));
  document.querySelectorAll('[data-del]').forEach(el=>el.onclick=()=>deleteFile(el.dataset.del));
  if(document.getElementById('prevQ')) document.getElementById('prevQ').onclick=()=>{questionIndex=Math.max(0,questionIndex-1); renderApp();};
  if(document.getElementById('nextQ')) document.getElementById('nextQ').onclick=()=>{questionIndex=Math.min(questions.length-1,questionIndex+1); renderApp();};
}

async function uploadFile(evt){
  const file = evt.target.files?.[0];
  if(!file) return;
  status('Enviando arquivo...');
  const path = `${user.id}/${activePanelId}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
  const up = await sb.storage.from(STORAGE_BUCKET).upload(path,file,{upsert:false});
  if(up.error){alert(up.error.message); status('Erro ao enviar.'); return;}
  const url = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path)?.data?.publicUrl || '';
  const ins = await sb.from('study_files').insert({user_id:user.id,study_panel_id:activePanelId,file_name:file.name,file_type:file.type||'',file_url:url,is_selected_for_ai:false});
  if(ins.error){alert(ins.error.message); status('Erro ao salvar arquivo.'); return;}
  await loadFiles(); renderApp(); status('Arquivo enviado.');
  evt.target.value='';
}

async function callAI(mode){
  const p=activePanel();
  const selected = files.filter(f=>f.is_selected_for_ai);
  if(!selected.length) throw new Error('Marque ao menos um arquivo.');
  const resp = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode,topic:p?.topic||'',panelTitle:p?.title||'',files:selected})});
  const data = await resp.json();
  if(!resp.ok) throw new Error(data.error||'Erro na IA');
  return data;
}

async function generateSummary(){
  try{
    status('Gerando resumo...');
    const data = await callAI('summary_from_files');

    const text = String(data.summary || '');

    const safe = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '</p><p>');

    const html = '<h3>Resumo gerado pela IA</h3><p>' + safe + '</p>';

    document.getElementById('editor').innerHTML = html;

    await savePanel();
    status('Resumo gerado.');
  }catch(err){
    alert(err.message);
    status('Erro ao gerar resumo.');
  }
}

async function generateQuestionsWithAI(){
  try{
    status('Gerando questões...');
    const data = await callAI('questions_from_files');
    const items = Array.isArray(data.questions)?data.questions:[];
    if(!items.length) throw new Error('Nenhuma questão retornada');
    const payload = items.map(q=>({user_id:user.id,study_panel_id:activePanelId,question_type:'mc',prompt:q.prompt||'Questão',options_json:q.options||[],correct_answer:q.correct_answer||'A',created_by:'ai',difficulty:'medio'}));
    const del = await sb.from('study_questions').delete().eq('user_id',user.id).eq('study_panel_id',activePanelId);
    const ins = await sb.from('study_questions').insert(payload);
    if(ins.error) throw ins.error;
    await loadQuestions(); renderApp(); status('Questões geradas.');
  }catch(err){alert(err.message); status('Erro ao gerar questões.')}
}

async function generateFlashcardsWithAI(){
  try{
    status('Gerando flashcards...');
    const data = await callAI('flashcards_from_files');
    const items = Array.isArray(data.flashcards)?data.flashcards:[];
    if(!items.length) throw new Error('Nenhum flashcard retornado');
    const payload = items.map(f=>({user_id:user.id,study_panel_id:activePanelId,front:f.front||'Frente',back:f.back||'Verso',discipline:activePanel()?.title||'',theme:activePanel()?.topic||''}));
    await sb.from('study_flashcards').delete().eq('user_id',user.id).eq('study_panel_id',activePanelId);
    const ins = await sb.from('study_flashcards').insert(payload);
    if(ins.error) throw ins.error;
    await loadFlashcards(); renderApp(); status('Flashcards gerados.');
  }catch(err){alert(err.message); status('Erro ao gerar flashcards.')}
}

init();
</script>
</body>
</html>
